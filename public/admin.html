    fetch('/api/tickets').then(r=>r.json()).then(d=>setTickets(d.tickets||[])).catch(()=>{});
  },[]);

  const openCount=tickets.filter(t=>/open|new/i.test(t.status||'')).length+tickets.filter(t=>/progress|working/i.test(t.status||'')).length;
  const cats={};tickets.forEach(t=>{const c=t.typeOfHelp||'Other';cats[c]=(cats[c]||0)+1});
  const topCat=Object.entries(cats).sort((a,b)=>b[1]-a[1])[0]||['—',0];
  const tData=[4,6,5,8,7,11,9,6,12,10,14,9,11,12];
  const dData=[12,10,13,14,15,18,16,14,19,17,22,18,21,24];

  // Session grouping
  const sessions=useMemo(()=>{const m={};convs.forEach(c=>{const k=(c.customer_email||'?')+'|'+(c.created_at||'').slice(0,10);if(!m[k])m[k]={email:c.customer_email||'?',name:c.customer_name||c.customer_email||'Unknown',msgs:[]};m[k].msgs.push(c)});return m;},[convs]);
  const sessArr=Object.values(sessions);
  const sessionCount=sessArr.length;

  // Hour histogram (based on message timestamps)
  const hourCounts=useMemo(()=>{const h=Array(24).fill(0);convs.forEach(c=>{try{h[new Date(c.created_at).getHours()]++}catch{}});return h;},[convs]);
  const maxHour=Math.max(...hourCounts,1);
  const peakHour=hourCounts.indexOf(Math.max(...hourCounts));
  const fmtHr=h=>{const ap=h>=12?'pm':'am';return`${h%12||12}${ap}`};

  // Top customers by session count
  const custMap=useMemo(()=>{const m={};sessArr.forEach(s=>{if(!m[s.email])m[s.email]={email:s.email,name:s.name,sessions:0,msgs:0};m[s.email].sessions++;m[s.email].msgs+=s.msgs.length});return m;},[sessArr]);
  const topCustomers=Object.values(custMap).sort((a,b)=>b.sessions-a.sessions).slice(0,8);
  const uniqueCustomers=Object.keys(custMap).length;
  const avgMsgs=sessionCount>0?Math.round(convs.length/sessionCount):0;

  // Day-of-week counts
  const dayNames=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const dayCounts=useMemo(()=>{const d=Array(7).fill(0);convs.forEach(c=>{try{d[new Date(c.created_at).getDay()]++}catch{}});return d;},[convs]);
  const maxDay=Math.max(...dayCounts,1);

  return(
    <div className="st-page">
      <PageHead eyebrow="OVERVIEW" title="Analytics" sub="Live snapshot of the support floor — tickets, RUFUS sessions, and customer activity."
        right={<button className="st-btn-ghost st-btn-sm">Last 30 days<I.ChevD width="11" height="11"/></button>}
      />
      <div className="st-stat-grid">
        <StatCard label="OPEN TICKETS" value={String(openCount)} hint="across all staff" icon={<I.Inbox/>}/>
        <StatCard label="RUFUS SESSIONS" value={String(sessionCount)} hint={`${uniqueCustomers} unique customers`} icon={<I.Spark/>}/>
        <StatCard label="TOP CATEGORY" value={topCat[0]} hint={`${topCat[1]} tickets`} icon={<I.Bolt/>} category/>
        <StatCard label="AVG SESSION" value={String(avgMsgs)} hint="messages per conversation" icon={<I.Clock/>} accent/>
      </div>

      <div className="st-analytics-grid" style={{marginBottom:12}}>
        <div className="st-analytics-card">
          <div className="st-analytics-head">
            <div><div className="st-analytics-eyebrow">VOLUME · LAST 14 DAYS</div><h3 className="st-analytics-title">Tickets opened vs. RUFUS deflected</h3></div>
            <div className="st-legend"><span><span className="st-legend-sw st-legend-sw-red"/>Tickets</span><span><span className="st-legend-sw st-legend-sw-ghost"/>Deflected</span></div>
          </div>
          <AnalyticsChart tickets={tData} deflected={dData}/>
        </div>
        <div className="st-analytics-card">
          <div className="st-analytics-head"><div className="st-analytics-eyebrow">TICKET CATEGORY MIX</div></div>
          <div className="st-cat-list">
            {(Object.entries(cats).length>0?Object.entries(cats).sort((a,b)=>b[1]-a[1]).slice(0,6):[['Motion',34],['Display',22],['Software',18],['Audio',12],['Hardware',9],['Other',5]]).map(([l,n],i)=>(
              <div key={l} className="st-cat-row">
                <span className="st-cat-l">{l}</span>
                <div className="st-cat-bar"><div className={`st-cat-fill st-cat-fill-${['red','amber','blue','green','violet','ghost'][i%6]}`} style={{width:`${Math.min(n*2.4,100)}%`}}/></div>
                <span className="st-cat-n">{n}</span>
              </div>
            ))}
          </div>
        </div>
      </div>

      <div style={{fontSize:10,fontWeight:500,color:'rgba(255,252,246,0.35)',letterSpacing:'0.10em',textTransform:'uppercase',marginBottom:10}}>RUFUS INTELLIGENCE</div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:12}}>
        <div className="st-analytics-card" style={{padding:'12px 16px'}}>
          <div className="st-analytics-eyebrow" style={{marginBottom:4}}>TOTAL MESSAGES</div>
          <div style={{fontSize:36,fontFamily:'var(--font-display)',color:'#fff',lineHeight:1}}>{convs.length}</div>
          <div style={{fontSize:11,color:'rgba(255,252,246,0.40)',marginTop:5}}>exchanged with RUFUS</div>
        </div>
        <div className="st-analytics-card" style={{padding:'12px 16px'}}>
          <div className="st-analytics-eyebrow" style={{marginBottom:4}}>UNIQUE CUSTOMERS</div>
          <div style={{fontSize:36,fontFamily:'var(--font-display)',color:'#fff',lineHeight:1}}>{uniqueCustomers}</div>
          <div style={{fontSize:11,color:'rgba(255,252,246,0.40)',marginTop:5}}>have chatted with RUFUS</div>
        </div>
        <div className="st-analytics-card" style={{padding:'12px 16px'}}>
          <div className="st-analytics-eyebrow" style={{marginBottom:4}}>DEFLECTION RATE</div>
          <div style={{fontSize:36,fontFamily:'var(--font-display)',color:'#fff',lineHeight:1}}>{Math.round(sessionCount/(tickets.length||1)*100)}%</div>
          <div style={{fontSize:11,color:'rgba(255,252,246,0.40)',marginTop:5}}>customers used RUFUS before a ticket</div>
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}}>
        <div className="st-analytics-card">
          <div className="st-analytics-head" style={{marginBottom:8}}>
            <div><div className="st-analytics-eyebrow">ACTIVITY BY HOUR</div><h3 className="st-analytics-title">{convs.length>0?`Peak time: ${fmtHr(peakHour)}`:'No data yet'}</h3></div>
          </div>
          <div className="st-hour-chart">
            {hourCounts.map((v,h)=>(
              <div key={h} className="st-hour-bar" style={{height:`${Math.max((v/maxHour)*100,4)}%`}} title={`${fmtHr(h)}: ${v} messages`}/>
            ))}
          </div>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'rgba(255,252,246,0.28)',marginTop:5}}>
            <span>12am</span><span>6am</span><span>12pm</span><span>6pm</span><span>11pm</span>
          </div>
        </div>
        <div className="st-analytics-card">
          <div className="st-analytics-head" style={{marginBottom:8}}>
            <div><div className="st-analytics-eyebrow">ACTIVITY BY DAY</div><h3 className="st-analytics-title">{convs.length>0?`Busiest: ${dayNames[dayCounts.indexOf(Math.max(...dayCounts))]}`:'No data yet'}</h3></div>
          </div>
          <div style={{display:'flex',alignItems:'flex-end',gap:6,height:56,padding:'0 2px'}}>
            {dayCounts.map((v,d)=>(
              <div key={d} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:4,height:'100%',justifyContent:'flex-end'}}>
                <div style={{width:'100%',background:'rgba(96,165,250,0.4)',borderRadius:'2px 2px 0 0',height:`${Math.max((v/maxDay)*100,4)}%`,transition:'height .3s'}} title={`${dayNames[d]}: ${v}`}/>
              </div>
            ))}
          </div>
          <div style={{display:'flex',justifyContent:'space-around',fontSize:10,color:'rgba(255,252,246,0.28)',marginTop:5}}>
            {dayNames.map(d=><span key={d}>{d}</span>)}
          </div>
        </div>
      </div>

      <div className="st-analytics-card">
        <div className="st-analytics-head" style={{marginBottom:10}}>
          <div><div className="st-analytics-eyebrow">TOP RUFUS USERS</div><h3 className="st-analytics-title">Customers with the most conversations</h3></div>
        </div>
        {topCustomers.length===0&&<div className="st-empty">No conversation data yet.</div>}
        {topCustomers.map((c,i)=>(
          <div key={c.email} className="st-rufus-row">
            <span className="st-rufus-rank">{i+1}</span>
            <Av initials={initials(c.name)} size={22}/>
            <span style={{flex:1,fontSize:13,fontWeight:500,color:'#fff',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.name}</span>
            <span style={{fontSize:11,color:'rgba(255,252,246,0.45)',minWidth:80,textAlign:'right'}}>{c.email}</span>
            <Pill tone="blue">{c.sessions} session{c.sessions!==1?'s':''}</Pill>
            <span style={{fontSize:11,color:'rgba(255,252,246,0.40)',fontFamily:'var(--font-mono)',minWidth:50,textAlign:'right'}}>{c.msgs} msgs</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── STAFF MANAGEMENT ──────────────────────────────────────────────────────
function StaffPage(){
  const[staff,setStaff]=useState([]);
  const[loading,setLoading]=useState(true);
  const[showAdd,setShowAdd]=useState(false);
  const[form,setForm]=useState({name:'',email:'',password:'',role:'support'});
  const[saving,setSaving]=useState(false);

  const load=()=>{fetch('/api/staff').then(r=>r.json()).then(d=>{setStaff(d.staff||[]);setLoading(false)}).catch(()=>setLoading(false))};
  useEffect(load,[]);

  const add=async()=>{
    setSaving(true);
    await fetch('/api/staff',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'create',...form})});
    setSaving(false);setShowAdd(false);setForm({name:'',email:'',password:'',role:'support'});load();
  };
  const remove=async email=>{if(!confirm('Remove this staff member?'))return;await fetch('/api/staff',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'remove',email})});load()};

  return(
    <div className="st-page">
      <PageHead eyebrow="ADMIN · STAFF" title="Staff management" sub="Manage staff accounts and roles. Admin-only."
        right={<button className="st-btn-primary" onClick={()=>setShowAdd(true)}><I.Plus width="13" height="13"/>Add staff</button>}
      />
      {loading&&<div className="st-loading"><Spin/> Loading…</div>}
      {!loading&&(
        <div className="st-table">
          <div className="st-table-head st-table-head-staff"><div>Name</div><div>Email</div><div>Role</div><div></div></div>
          {staff.length===0&&<div className="st-empty">No staff members found.</div>}
          {staff.map(s=>(
            <div key={s.email||s.id} className="st-table-row st-table-row-staff">
              <div className="st-row-cust"><Av initials={initials(s.name)} size={24}/><span>{s.name}</span></div>
              <div className="st-row-text">{s.email}</div>
              <div><Pill tone={s.role==='admin'?'red':'ghost'}>{s.role||'support'}</Pill></div>
              <div className="st-row-actions"><button className="st-btn-danger st-btn-sm" onClick={()=>remove(s.email)}><I.Trash width="12" height="12"/>Remove</button></div>
            </div>
          ))}
        </div>
      )}
      {showAdd&&(
        <div className="st-overlay" onClick={()=>setShowAdd(false)}>
          <div className="st-modal" onClick={e=>e.stopPropagation()}>
            <div className="st-modal-head"><span className="st-modal-title">Add staff member</span><button className="st-icon-btn" onClick={()=>setShowAdd(false)}><I.X width="13" height="13"/></button></div>
            <div className="st-modal-body">
              <div className="st-form-field"><label className="st-form-label">Full name *</label><input className="st-input" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="Jane Smith"/></div>
              <div className="st-form-field"><label className="st-form-label">Email *</label><input className="st-input" type="email" value={form.email} onChange={e=>setForm(f=>({...f,email:e.target.value}))} placeholder="jane@podium1racing.com"/></div>
              <div className="st-form-field"><label className="st-form-label">Password *</label><input className="st-input" type="password" value={form.password} onChange={e=>setForm(f=>({...f,password:e.target.value}))} placeholder="••••••••"/></div>
              <div className="st-form-field"><label className="st-form-label">Role</label><select className="st-input" value={form.role} onChange={e=>setForm(f=>({...f,role:e.target.value}))}><option value="support">Support</option><option value="admin">Admin</option></select></div>
            </div>
            <div className="st-modal-actions"><button className="st-btn-ghost" onClick={()=>setShowAdd(false)}>Cancel</button><button className="st-btn-primary" onClick={add} disabled={!form.name||!form.email||!form.password||saving}>{saving?<Spin/>:'Add staff member'}</button></div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── APP ────────────────────────────────────────────────────────────────────
function App(){
  const[me,setMe]=useState(null);
  const[tab,setTab]=useState('queue');
  const[collapsed,setCollapsed]=useState(()=>{const s=localStorage.getItem('p1_staff_sidebar_collapsed');if(s!==null)return s==='true';return window.innerWidth<768});
  const[openCount,setOpenCount]=useState(0);
  const[showSearch,setShowSearch]=useState(false);

  useEffect(()=>{localStorage.setItem('p1_staff_sidebar_collapsed',String(collapsed))},[collapsed]);

  useEffect(()=>{
    if(!me)return;
    fetch('/api/tickets').then(r=>r.json()).then(d=>{
      const t=d.tickets||[];
      setOpenCount(t.filter(x=>/open|new|progress|working/i.test(x.status||'')).length);
    }).catch(()=>{});
  },[me]);

  useEffect(()=>{
    if(!me)return;
    const h=e=>{
      if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT')return;
      if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();setShowSearch(true);return;}
      const map={q:'queue',c:'customers',v:'convs',n:'news',b:'kb',t:'snippets',a:'analytics',s:'staff'};
      if(map[e.key.toLowerCase()]){if(map[e.key.toLowerCase()]==='s'&&me.role!=='admin')return;setTab(map[e.key.toLowerCase()]);}
    };
    window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);
  },[me]);

  if(!me)return <Login onSignIn={setMe}/>;

  return(
    <div className="st-app">
      <button className="st-mob-ham" onClick={()=>setCollapsed(false)} aria-label="Open menu"><span/><span/><span/></button>
      <div className={`st-mob-backdrop${!collapsed?' show':''}`} onClick={()=>setCollapsed(true)}/>
      {showSearch&&<SearchModal onClose={()=>setShowSearch(false)} setTab={t=>{setTab(t);setShowSearch(false)}}/>}
      <Sidebar tab={tab} setTab={setTab} me={me} collapsed={collapsed} setCollapsed={setCollapsed} openCount={openCount} onOpenSearch={()=>setShowSearch(true)} onLogout={()=>setMe(null)}/>
      <main className="st-main">
        {tab==='queue'     &&<TicketQueue me={me}/>}
        {tab==='customers' &&<CustomerLookup me={me}/>}
        {tab==='convs'     &&<Conversations/>}
        {tab==='news'      &&<NewsManager/>}
        {tab==='kb'        &&<KBManager/>}
        {tab==='snippets'  &&<TrainRufus/>}
        {tab==='analytics' &&<Analytics/>}

        {tab==='staff'     &&me.role==='admin'&&<StaffPage/>}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
