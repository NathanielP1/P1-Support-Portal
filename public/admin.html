<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Podium 1 Racing — Staff Dashboard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&family=DM+Mono:wght@400;500&display=swap');
:root{--bg-deep:#080808;--red:#CC1122;--text-primary:#FFFCF6;--text-muted:rgba(255,252,246,0.62);--text-faint:rgba(255,252,246,0.40);--font-display:'Bebas Neue','Impact',sans-serif;--font-body:'DM Sans',system-ui,sans-serif;--font-mono:'DM Mono','JetBrains Mono',monospace}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%}
body{font-family:var(--font-body);background:#070708;color:var(--text-primary);font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased;letter-spacing:-0.005em;overflow:hidden}
button,input,textarea,select{font-family:inherit;color:inherit}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:3px}::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.16)}
.mono{font-family:var(--font-mono)}
/* LOGIN */
.st-login{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;background:#060608}
.st-login-bg{position:absolute;inset:0;background:radial-gradient(circle at 50% -10%,rgba(204,17,34,0.15),transparent 55%);pointer-events:none}
.st-login-card{position:relative;width:380px;max-width:100%;background:linear-gradient(180deg,rgba(255,255,255,0.04),rgba(255,255,255,0.01));border:1px solid rgba(255,255,255,0.07);border-radius:14px;padding:34px 34px 26px;box-shadow:0 30px 80px rgba(0,0,0,0.5);animation:fadeUp .4s cubic-bezier(.4,0,.2,1) both}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.st-login-eyebrow{font-family:var(--font-display);font-size:11px;letter-spacing:0.2em;color:rgba(255,252,246,0.40);margin-bottom:14px}
.st-login-h1{font-size:24px;font-weight:600;letter-spacing:-0.5px;margin-bottom:6px}
.st-login-sub{font-size:13px;color:rgba(255,252,246,0.62);margin-bottom:22px;line-height:1.55}
.st-label{display:block;font-size:11px;font-weight:500;color:rgba(255,252,246,0.62);margin-bottom:6px}
.st-input{display:block;width:100%;padding:9px 12px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:7px;font-size:13px;color:var(--text-primary);outline:none;transition:all .15s ease}
.st-input:focus{border-color:rgba(204,17,34,0.55);background:rgba(204,17,34,0.04);box-shadow:0 0 0 3px rgba(204,17,34,0.10)}
.st-input::placeholder{color:rgba(255,252,246,0.30)}
.st-login-err{background:rgba(204,17,34,0.10);border:1px solid rgba(204,17,34,0.25);color:#f8505f;font-size:12px;padding:8px 12px;border-radius:7px;margin-bottom:12px}
/* BUTTONS */
.st-btn-primary{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:8px 13px;background:#CC1122;border:1px solid rgba(255,255,255,0.08);color:#fff;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s ease;position:relative}
.st-btn-primary::after{content:'';position:absolute;inset:0;border-radius:7px;background:linear-gradient(180deg,rgba(255,255,255,0.16),transparent 50%);pointer-events:none}
.st-btn-primary:hover{background:#e0162a;box-shadow:0 6px 20px rgba(204,17,34,0.40)}
.st-btn-primary:disabled{background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.3);cursor:not-allowed;box-shadow:none}
.st-btn-ghost{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:7px 12px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);color:rgba(255,252,246,0.86);border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s ease}
.st-btn-ghost:hover{background:rgba(255,255,255,0.06);border-color:rgba(255,255,255,0.14)}
.st-btn-sm{padding:5px 10px;font-size:11px}
.st-icon-btn{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;background:transparent;border:1px solid transparent;color:rgba(255,252,246,0.62);border-radius:6px;cursor:pointer;transition:all .15s ease}
.st-icon-btn:hover{background:rgba(255,255,255,0.05);color:#fff;border-color:rgba(255,255,255,0.08)}
.st-btn-danger{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:7px 12px;background:rgba(204,17,34,0.10);border:1px solid rgba(204,17,34,0.25);color:#f8505f;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s ease}
.st-btn-danger:hover{background:rgba(204,17,34,0.18)}
/* PILLS */
.st-pill{display:inline-flex;align-items:center;gap:5px;padding:2px 8px;border-radius:5px;font-size:11px;font-weight:500;border:1px solid transparent;white-space:nowrap}
.st-pill-dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}
.st-pill-amber{background:rgba(245,158,11,0.10);color:#f59e0b;border-color:rgba(245,158,11,0.18)}
.st-pill-green{background:rgba(34,197,94,0.10);color:#22c55e;border-color:rgba(34,197,94,0.18)}
.st-pill-blue{background:rgba(96,165,250,0.10);color:#60a5fa;border-color:rgba(96,165,250,0.18)}
.st-pill-red{background:rgba(204,17,34,0.10);color:#f8505f;border-color:rgba(204,17,34,0.20)}
.st-pill-ghost{background:rgba(255,255,255,0.04);color:rgba(255,252,246,0.62);border-color:rgba(255,255,255,0.06)}
.st-dot{display:inline-block;width:6px;height:6px;border-radius:50%}
.st-dot-green{background:#22c55e;box-shadow:0 0 6px rgba(34,197,94,0.5)}
.st-kbd{margin-left:auto;font-family:var(--font-mono);font-size:10px;padding:1px 6px;border-radius:4px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.07);color:rgba(255,252,246,0.40);min-width:20px;text-align:center}
.st-avatar{display:inline-flex;align-items:center;justify-content:center;border-radius:50%;color:#fff;font-weight:600;flex-shrink:0;border:1px solid rgba(255,255,255,0.08)}
.st-spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.1);border-top-color:#CC1122;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* APP SHELL */
.st-app{display:flex;height:100vh;overflow:hidden;background:#08080a}
/* SIDEBAR */
.st-side{flex-shrink:0;background:#08080a;border-right:1px solid rgba(255,255,255,0.05);display:flex;flex-direction:column;padding:8px;gap:2px;transition:width 200ms ease;overflow:hidden}
.st-side-top{padding:4px;display:flex;align-items:center;gap:6px;min-height:44px}
.st-hamburger{display:flex;flex-direction:column;justify-content:center;gap:3px;width:26px;height:26px;background:transparent;border:1px solid transparent;border-radius:6px;cursor:pointer;padding:4px;flex-shrink:0;transition:all .15s ease}
.st-hamburger:hover{background:rgba(255,255,255,0.05)}
.st-hamburger span{display:block;width:18px;height:2px;background:rgba(255,252,246,0.62);border-radius:1px}
.st-org{display:flex;align-items:center;gap:8px;padding:3px 6px;background:transparent;border:none;cursor:default;flex:1;min-width:0;overflow:hidden}
.st-org-text{flex:1;text-align:left;display:flex;flex-direction:column;gap:1px;min-width:0}
.st-org-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.st-org-sub{font-size:11px;color:rgba(255,252,246,0.40);white-space:nowrap}
.st-side-search{display:flex;align-items:center;gap:8px;padding:6px 10px;margin:2px 2px 4px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:7px;font-size:12px;color:rgba(255,252,246,0.40);cursor:pointer;white-space:nowrap;overflow:hidden;transition:all .15s ease}
.st-side-search:hover{background:rgba(255,255,255,0.05);color:rgba(255,252,246,0.62)}
.st-side-section{font-size:10px;font-weight:500;color:rgba(255,252,246,0.30);padding:12px 12px 4px;letter-spacing:0.10em;white-space:nowrap;overflow:hidden}
.st-nav{display:flex;flex-direction:column;gap:1px;padding:0 2px}
.st-nav-item{display:flex;align-items:center;gap:9px;padding:6px 9px;background:transparent;border:none;color:rgba(255,252,246,0.62);font-size:13px;font-weight:500;border-radius:6px;cursor:pointer;transition:all .12s ease;text-align:left;width:100%;white-space:nowrap;overflow:hidden;position:relative}
.st-nav-item:hover{background:rgba(255,255,255,0.04);color:rgba(255,252,246,0.86)}
.st-nav-item.on{background:rgba(255,255,255,0.06);color:#fff}
.st-nav-item.on svg{color:#fff}
.st-nav-item svg{color:rgba(255,252,246,0.50);flex-shrink:0}
.st-nav-item .lbl{flex:1}
.st-nav-badge{font-family:var(--font-mono);font-size:10px;padding:1px 6px;border-radius:4px;background:#CC1122;color:#fff;min-width:20px;text-align:center;font-weight:600}
.st-shift-card{margin:4px 4px 0;padding:9px 12px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);border-radius:8px;display:flex;flex-direction:column;gap:4px}
.st-shift-row{display:flex;justify-content:space-between;align-items:center;font-size:11px}
.st-shift-key{color:rgba(255,252,246,0.40)}
.st-shift-val{color:rgba(255,252,246,0.86);font-weight:500;display:flex;align-items:center;gap:5px}
.st-side-foot{margin-top:auto;padding:10px 6px 6px;border-top:1px solid rgba(255,255,255,0.05);display:flex;align-items:center;gap:8px;overflow:hidden}
.st-side-user{flex:1;min-width:0}
.st-side-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.st-side-email{font-size:11px;color:rgba(255,252,246,0.40);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.st-nav-tooltip{position:absolute;left:calc(100% + 10px);top:50%;transform:translateY(-50%);background:#1a1a1f;border:1px solid rgba(255,255,255,0.10);border-radius:6px;padding:4px 9px;font-size:12px;color:#fff;white-space:nowrap;pointer-events:none;opacity:0;z-index:100;transition:opacity .1s ease}
.st-nav-item:hover .st-nav-tooltip{opacity:1}
/* MAIN */
.st-main{flex:1;overflow-y:auto;background:#0a0a0c;min-width:0}
.st-page{max-width:1200px;margin:0 auto;padding:34px 40px 80px;animation:pageIn .25s ease both}
@keyframes pageIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.st-pagehead{display:flex;align-items:flex-start;justify-content:space-between;gap:24px;margin-bottom:22px}
.st-pagehead-right{flex-shrink:0}
.st-eyebrow{font-family:var(--font-display);font-size:11px;letter-spacing:0.20em;color:rgba(255,252,246,0.40);margin-bottom:9px}
.st-h1{font-size:26px;font-weight:600;letter-spacing:-0.6px;line-height:1.15;display:flex;align-items:center;gap:12px}
.st-h1-count{font-family:var(--font-mono);font-size:16px;color:rgba(255,252,246,0.40);font-weight:400;background:rgba(255,255,255,0.04);padding:2px 10px;border-radius:6px;border:1px solid rgba(255,255,255,0.06)}
.st-pagesub{font-size:13px;color:rgba(255,252,246,0.62);margin-top:7px;line-height:1.55}
/* TABS */
.st-tabs{display:flex;align-items:center;gap:2px;margin-bottom:14px;border-bottom:1px solid rgba(255,255,255,0.05)}
.st-tab{display:inline-flex;align-items:center;gap:7px;padding:7px 12px;background:transparent;border:none;color:rgba(255,252,246,0.50);font-size:12px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s ease}
.st-tab:hover{color:rgba(255,252,246,0.86)}
.st-tab.on{color:#fff;border-bottom-color:#CC1122}
.st-tab-n{font-family:var(--font-mono);font-size:10px;padding:0 5px;border-radius:3px;background:rgba(255,255,255,0.05);color:rgba(255,252,246,0.50);min-width:18px;text-align:center}
.st-tab.on .st-tab-n{background:rgba(204,17,34,0.15);color:#f8505f}
.st-tab-spacer{flex:1}
/* TABLE */
.st-table{background:rgba(255,255,255,0.015);border:1px solid rgba(255,255,255,0.06);border-radius:10px;overflow:hidden}
.st-table-head{display:grid;gap:12px;padding:9px 14px;background:rgba(255,255,255,0.02);border-bottom:1px solid rgba(255,255,255,0.05);font-size:10px;font-weight:500;color:rgba(255,252,246,0.40);text-transform:uppercase;letter-spacing:0.08em}
.st-table-head-q{grid-template-columns:82px 1.4fr 1.1fr 100px 120px 120px 120px}
.st-table-head-news{grid-template-columns:130px 1fr 120px 100px 140px}
.st-table-head-kb{grid-template-columns:60px 1fr 100px 110px 120px 65px 100px 80px}
.st-table-head-cust{grid-template-columns:1.2fr 1fr 110px 90px 80px 80px}
.st-table-head-staff{grid-template-columns:1.2fr 1fr 90px 90px}
.st-table-head-snip{grid-template-columns:1fr .8fr 120px 80px}
.st-table-head-conv{grid-template-columns:140px 1fr 120px 80px}
.st-table-row{display:grid;gap:12px;padding:10px 14px;align-items:center;background:transparent;border:none;border-top:1px solid rgba(255,255,255,0.04);width:100%;text-align:left;cursor:pointer;color:inherit;transition:background .12s ease}
.st-table-row:first-of-type{border-top:none}
.st-table-row:hover{background:rgba(255,255,255,0.025)}
.st-table-row.on{background:rgba(204,17,34,0.06);box-shadow:inset 2px 0 0 #CC1122}
.st-table-row-q{grid-template-columns:82px 1.4fr 1.1fr 100px 120px 120px 120px}
.st-table-row-news{grid-template-columns:130px 1fr 120px 100px 140px;cursor:default}
.st-table-row-kb{grid-template-columns:60px 1fr 100px 110px 120px 65px 100px 80px;cursor:default}
.st-table-row-cust{grid-template-columns:1.2fr 1fr 110px 90px 80px 80px;cursor:default}
.st-table-row-staff{grid-template-columns:1.2fr 1fr 90px 90px;cursor:default}
.st-table-row-snip{grid-template-columns:1fr .8fr 120px 80px;cursor:default}
.st-table-row-conv{grid-template-columns:140px 1fr 120px 80px;cursor:default}
.st-table-row-news.pinned{background:rgba(204,17,34,0.04)}
.st-row-id{font-size:11px;color:rgba(255,252,246,0.62);display:flex;align-items:center;gap:5px;white-space:nowrap;overflow:hidden}
.st-sev-high{display:inline-block;width:6px;height:6px;background:#CC1122;border-radius:50%;box-shadow:0 0 6px rgba(204,17,34,0.7);flex-shrink:0}
.st-row-cust{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:500;min-width:0;color:#fff}
.st-row-cust span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.st-row-text{font-size:12px;color:rgba(255,252,246,0.86);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.st-row-meta{font-size:11px;color:rgba(255,252,246,0.50)}
.st-row-agent{display:flex;align-items:center;gap:7px;font-size:12px;color:rgba(255,252,246,0.86)}
.st-row-unassigned{font-size:11px;color:rgba(255,252,246,0.40);font-style:italic}
.st-row-actions{display:flex;align-items:center;gap:6px;justify-content:flex-end}
.st-wrap-text{white-space:normal!important;overflow:visible!important;line-height:1.4;color:#fff;font-weight:500}
/* DETAIL PANEL */
.st-detail{width:420px;flex-shrink:0;background:#08080a;border-left:1px solid rgba(255,255,255,0.05);overflow-y:auto;padding:22px 22px 80px;animation:slideIn .25s ease both}
@keyframes slideIn{from{opacity:0;transform:translateX(8px)}to{opacity:1;transform:none}}
.st-detail-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:16px}
.st-detail-id{font-size:11px;color:rgba(255,252,246,0.50);margin-bottom:7px;font-family:var(--font-mono)}
.st-detail-title{font-size:14px;font-weight:600;line-height:1.4;color:#fff}
.st-detail-meta{display:flex;flex-direction:column;gap:8px;padding:12px 0;border-top:1px solid rgba(255,255,255,0.05);border-bottom:1px solid rgba(255,255,255,0.05);margin-bottom:16px}
.st-detail-row{display:grid;grid-template-columns:88px 1fr;align-items:center;gap:10px;font-size:12px;min-height:22px}
.st-detail-key{color:rgba(255,252,246,0.40);font-size:11px}
.st-detail-val{color:rgba(255,252,246,0.86)}
.st-detail-section{margin-bottom:16px}
.st-detail-section-head{font-family:var(--font-display);font-size:10px;letter-spacing:0.16em;color:rgba(255,252,246,0.40);margin-bottom:9px}
.st-detail-cust{display:flex;align-items:center;gap:11px;padding:10px 12px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:8px}
.st-detail-cust-text{flex:1;min-width:0}
.st-detail-cust-name{font-size:13px;font-weight:600;color:#fff}
.st-detail-cust-meta{font-size:11px;color:rgba(255,252,246,0.50)}
.st-detail-body{font-size:12.5px;color:rgba(255,252,246,0.78);line-height:1.6}
.st-detail-rufus{padding:12px;background:rgba(204,17,34,0.04);border:1px solid rgba(204,17,34,0.18);border-radius:8px}
.st-detail-rufus-head{display:flex;align-items:center;gap:7px;margin-bottom:8px;font-family:var(--font-display);font-size:11px;letter-spacing:0.14em;color:#f8505f}
.st-detail-rufus-stamp{margin-left:auto;font-size:10px;color:rgba(255,252,246,0.40);font-family:var(--font-mono)}
.st-detail-rufus-body{font-size:12px;color:rgba(255,252,246,0.86);line-height:1.6}
.st-detail-actions{display:flex;gap:7px;flex-wrap:wrap}
/* SEARCH */
.st-search-big{display:flex;align-items:center;gap:11px;padding:12px 16px;background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.08);border-radius:10px;margin-bottom:18px;transition:all .15s ease}
.st-search-big:focus-within{border-color:rgba(204,17,34,0.45);box-shadow:0 0 0 3px rgba(204,17,34,0.08)}
.st-search-big svg{color:rgba(255,252,246,0.50);flex-shrink:0}
.st-search-input{flex:1;background:transparent;border:none;outline:none;font-size:14px;color:#fff}
.st-search-input::placeholder{color:rgba(255,252,246,0.40)}
/* LOOKUP */
.st-lookup-grid{display:grid;grid-template-columns:300px 1fr;gap:16px;align-items:flex-start}
.st-lookup-list{background:rgba(255,255,255,0.015);border:1px solid rgba(255,255,255,0.06);border-radius:10px;overflow:hidden}
.st-lookup-list-head{padding:8px 12px;font-size:10px;color:rgba(255,252,246,0.40);letter-spacing:0.08em;text-transform:uppercase;border-bottom:1px solid rgba(255,255,255,0.05);background:rgba(255,255,255,0.02)}
.st-lookup-row{display:flex;align-items:center;gap:10px;padding:9px 12px;background:transparent;border:none;border-top:1px solid rgba(255,255,255,0.04);cursor:pointer;text-align:left;color:inherit;transition:background .12s ease;width:100%}
.st-lookup-row:first-of-type{border-top:none}
.st-lookup-row:hover{background:rgba(255,255,255,0.025)}
.st-lookup-row.on{background:rgba(204,17,34,0.06);box-shadow:inset 2px 0 0 #CC1122}
.st-lookup-row-text{flex:1;min-width:0}
.st-lookup-row-name{font-size:13px;font-weight:600;color:#fff}
.st-lookup-row-meta{font-size:11px;color:rgba(255,252,246,0.50);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.st-customer-card{background:rgba(255,255,255,0.015);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:22px}
.st-customer-head{display:flex;align-items:center;gap:14px;padding-bottom:16px;border-bottom:1px solid rgba(255,255,255,0.05);margin-bottom:16px}
.st-customer-head-text{flex:1;min-width:0}
.st-customer-name{font-size:19px;font-weight:600;letter-spacing:-0.4px;color:#fff;margin-bottom:5px}
.st-customer-meta{display:flex;flex-wrap:wrap;gap:12px;font-size:12px;color:rgba(255,252,246,0.62)}
.st-customer-meta span{display:inline-flex;align-items:center;gap:5px}
.st-customer-meta svg{color:rgba(255,252,246,0.40)}
.st-customer-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.st-cstat{padding:10px 12px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);border-radius:8px}
.st-cstat-l{font-size:10px;color:rgba(255,252,246,0.40);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:4px}
.st-cstat-v{font-size:12px;color:#fff;font-weight:500}
.st-customer-section{margin-top:16px}
.st-customer-section-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:9px}
.st-customer-section-head h3{font-size:13px;font-weight:600;color:#fff}
.st-mini-table{display:flex;flex-direction:column;border:1px solid rgba(255,255,255,0.05);border-radius:8px;overflow:hidden}
.st-mini-row{display:grid;grid-template-columns:85px 1fr 85px 110px 75px;gap:10px;align-items:center;padding:8px 12px;border-top:1px solid rgba(255,255,255,0.04);font-size:12px}
.st-mini-row:first-child{border-top:none}
.st-mini-text{color:rgba(255,252,246,0.86);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.st-mini-date{font-size:11px;color:rgba(255,252,246,0.50)}
/* PIN */
.st-callout{padding:14px 16px;background:linear-gradient(180deg,rgba(204,17,34,0.06),rgba(255,255,255,0.01));border:1px solid rgba(204,17,34,0.20);border-radius:10px;margin-bottom:16px}
.st-callout-head{display:flex;align-items:center;gap:7px;font-family:var(--font-display);font-size:10px;letter-spacing:0.14em;color:#f8505f;margin-bottom:9px}
.st-callout-body{display:flex;align-items:center;gap:14px;justify-content:space-between}
.st-callout-src{font-size:11px;color:rgba(255,252,246,0.50);margin-bottom:4px;font-weight:500}
.st-callout-title{font-size:14px;font-weight:600;color:#fff;line-height:1.35}
.st-callout-empty{font-size:12px;color:rgba(255,252,246,0.50);font-style:italic}
.st-pin-btn{display:inline-flex;align-items:center;gap:5px;padding:4px 9px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);color:rgba(255,252,246,0.62);border-radius:5px;font-size:11px;cursor:pointer;transition:all .15s ease}
.st-pin-btn:hover{background:rgba(255,255,255,0.06);color:#fff}
.st-pin-btn.on{background:rgba(204,17,34,0.10);border-color:rgba(204,17,34,0.30);color:#f8505f}
/* ANALYTICS */
.st-stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.st-stat{padding:14px 16px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:10px;display:flex;flex-direction:column;gap:7px;position:relative;overflow:hidden}
.st-stat-accent{background:linear-gradient(180deg,rgba(204,17,34,0.06),rgba(255,255,255,0.01));border-color:rgba(204,17,34,0.20)}
.st-stat-accent::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(204,17,34,0.5),transparent)}
.st-stat-top{display:flex;align-items:center;justify-content:space-between}
.st-stat-label{font-size:10px;color:rgba(255,252,246,0.50);letter-spacing:0.08em;font-weight:500}
.st-stat-icon{color:rgba(255,252,246,0.40);display:flex}
.st-stat-accent .st-stat-icon{color:#f8505f}
.st-stat-value{font-family:var(--font-display);font-size:36px;letter-spacing:0.01em;line-height:1;color:#fff;font-weight:400}
.st-stat-category .st-stat-value{font-family:var(--font-body);font-size:22px;font-weight:600;letter-spacing:-0.5px}
.st-stat-foot{display:flex;align-items:center;gap:8px;font-size:11px}
.st-stat-delta{font-family:var(--font-mono);font-weight:600;font-size:11px}
.st-stat-delta-green{color:#22c55e}.st-stat-delta-red{color:#f8505f}
.st-stat-hint{color:rgba(255,252,246,0.40)}
.st-analytics-grid{display:grid;grid-template-columns:1.6fr 1fr;gap:12px}
.st-analytics-card{padding:16px 18px;background:rgba(255,255,255,0.015);border:1px solid rgba(255,255,255,0.06);border-radius:10px}
.st-analytics-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;gap:14px}
.st-analytics-eyebrow{font-family:var(--font-display);font-size:10px;letter-spacing:0.14em;color:rgba(255,252,246,0.50);margin-bottom:5px}
.st-analytics-title{font-size:13px;font-weight:600;color:#fff}
.st-legend{display:flex;gap:14px;font-size:11px;color:rgba(255,252,246,0.62)}
.st-legend span{display:inline-flex;align-items:center;gap:6px}
.st-legend-sw{display:inline-block;width:14px;height:2px;border-radius:1px}
.st-legend-sw-red{background:#CC1122}.st-legend-sw-ghost{background:rgba(255,252,246,0.40)}
.st-chart{width:100%;height:auto;display:block}
.st-cat-list{display:flex;flex-direction:column;gap:9px}
.st-cat-row{display:grid;grid-template-columns:75px 1fr 34px;align-items:center;gap:10px;font-size:12px}
.st-cat-l{color:rgba(255,252,246,0.86);font-weight:500}
.st-cat-bar{height:5px;background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden}
.st-cat-fill{height:100%;border-radius:3px}
.st-cat-fill-red{background:#CC1122}.st-cat-fill-amber{background:#f59e0b}.st-cat-fill-blue{background:#60a5fa}.st-cat-fill-green{background:#22c55e}.st-cat-fill-violet{background:#a855f7}.st-cat-fill-ghost{background:rgba(255,255,255,0.30)}
.st-cat-n{color:rgba(255,252,246,0.62);text-align:right;font-family:var(--font-mono)}
/* MODAL */
.st-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;display:flex;align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(8px);animation:fadeIn .15s ease both}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.st-modal{width:100%;max-width:480px;background:#0d0d10;border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:26px;box-shadow:0 30px 80px rgba(0,0,0,0.6);animation:fadeUp .2s cubic-bezier(.4,0,.2,1) both}
.st-modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.st-modal-title{font-size:16px;font-weight:600;color:#fff}
.st-modal-body{display:flex;flex-direction:column;gap:14px}
.st-form-field{display:flex;flex-direction:column;gap:5px}
.st-form-label{font-size:11px;font-weight:500;color:rgba(255,252,246,0.62)}
.st-modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.st-loading{display:flex;align-items:center;justify-content:center;padding:48px;gap:10px;color:rgba(255,252,246,0.40);font-size:13px}
.st-empty{padding:32px;text-align:center;color:rgba(255,252,246,0.40);font-size:13px}
.st-textarea{resize:vertical;min-height:100px;line-height:1.55;font-family:inherit;padding:10px 12px}
/* CONVERSATION */
.st-conv-session{margin-bottom:24px}
.st-conv-session-head{display:flex;align-items:center;gap:10px;font-size:12px;color:rgba(255,252,246,0.62);margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,0.05)}
.st-conv-session-cust{font-weight:600;color:#fff}
.st-conv-msg{display:flex;gap:8px;margin-bottom:8px;align-items:flex-start}
.st-conv-msg.user{flex-direction:row-reverse}
.st-conv-bubble{padding:8px 12px;border-radius:8px;font-size:12.5px;line-height:1.6;max-width:80%}
.st-conv-bubble-a{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06)}
.st-conv-bubble-u{background:rgba(204,17,34,0.08);border:1px solid rgba(204,17,34,0.15)}
@media(max-width:1280px){.st-stat-grid{grid-template-columns:repeat(2,1fr)}.st-analytics-grid{grid-template-columns:1fr}}
/* KB VIEW TOGGLE */
.st-kb-view-wrap{display:flex;gap:2px;padding:2px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:7px}
.st-kb-vbtn{display:inline-flex;align-items:center;justify-content:center;width:28px;height:26px;background:transparent;border:none;color:rgba(255,252,246,0.40);border-radius:5px;cursor:pointer;transition:all .12s ease}
.st-kb-vbtn:hover{color:rgba(255,252,246,0.80)}
.st-kb-vbtn.on{background:rgba(255,255,255,0.06);color:#fff}
.st-kb-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px}
.st-kb-card{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:10px;overflow:hidden;cursor:pointer;transition:all .15s ease}
.st-kb-card:hover{background:rgba(255,255,255,0.04);border-color:rgba(255,255,255,0.10)}
.st-kb-thumb{height:130px;background:#141414;display:flex;align-items:center;justify-content:center;overflow:hidden}
.st-kb-thumb img{width:100%;height:100%;object-fit:cover}
.st-kb-card-body{padding:10px 12px}
.st-kb-card-title{font-size:12px;font-weight:600;color:#fff;line-height:1.4;margin-bottom:5px}
.st-kb-card-cat{font-size:11px;color:rgba(255,252,246,0.50)}
/* VIDEO PLAYER */
.st-video-player{position:relative;padding-top:56.25%;background:#0a0a0c;border-radius:8px;overflow:hidden;margin-bottom:8px}
.st-video-player iframe{position:absolute;inset:0;width:100%;height:100%;border:none}
.st-video-card{background:rgba(255,255,255,0.015);border:1px solid rgba(255,255,255,0.06);border-radius:10px;overflow:hidden;margin-bottom:12px}
.st-video-card-body{padding:12px 14px}
.st-video-title{font-size:13px;font-weight:600;color:#fff;margin-bottom:4px}
.st-video-notes{font-size:12px;color:rgba(255,252,246,0.62);line-height:1.5;margin-bottom:8px}
/* SEARCH MODAL */
.st-search-modal{width:100%;max-width:580px;background:#0d0d10;border:1px solid rgba(255,255,255,0.10);border-radius:12px;box-shadow:0 30px 80px rgba(0,0,0,0.7);overflow:hidden;animation:fadeUp .15s cubic-bezier(.4,0,.2,1) both}
.st-search-modal-bar{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid rgba(255,255,255,0.06)}
.st-search-modal-bar input{flex:1;background:transparent;border:none;outline:none;font-size:15px;color:#fff}
.st-search-modal-bar input::placeholder{color:rgba(255,252,246,0.28)}
.st-search-results{max-height:380px;overflow-y:auto;padding:6px 6px 8px}
.st-search-sect{font-size:10px;font-weight:500;color:rgba(255,252,246,0.28);letter-spacing:0.10em;padding:8px 10px 4px;text-transform:uppercase}
.st-search-result{display:flex;align-items:center;gap:9px;padding:8px 10px;background:transparent;border:none;border-radius:7px;color:rgba(255,252,246,0.86);font-size:13px;cursor:pointer;text-align:left;width:100%;transition:background .1s ease}
.st-search-result:hover,.st-search-result:focus{background:rgba(255,255,255,0.05);outline:none}
.st-search-result svg{color:rgba(255,252,246,0.40);flex-shrink:0}
.st-search-result-meta{margin-left:auto;font-size:11px;color:rgba(255,252,246,0.35);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}
.st-search-empty{padding:28px;text-align:center;font-size:13px;color:rgba(255,252,246,0.40)}
.st-search-hints{display:flex;gap:16px;padding:9px 16px;font-size:11px;color:rgba(255,252,246,0.28);border-top:1px solid rgba(255,255,255,0.05)}
/* CONVERSATIONS COLLAPSIBLE */
.st-conv-customer{margin-bottom:10px;background:rgba(255,255,255,0.015);border:1px solid rgba(255,255,255,0.06);border-radius:10px;overflow:hidden}
.st-conv-cust-head{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;background:transparent;border:none;text-align:left;width:100%;transition:background .12s ease}
.st-conv-cust-head:hover{background:rgba(255,255,255,0.025)}
.st-conv-sess-body{padding:0 14px 10px}
.st-conv-sess-toggle{display:flex;align-items:center;gap:6px;padding:7px 0 5px;cursor:pointer;background:transparent;border:none;text-align:left;width:100%;font-size:10px;font-weight:500;color:rgba(255,252,246,0.30);letter-spacing:0.08em;text-transform:uppercase;transition:color .12s ease}
.st-conv-sess-toggle:hover{color:rgba(255,252,246,0.55)}
/* ANALYTICS EXTRAS */
.st-hour-chart{display:flex;align-items:flex-end;gap:2px;height:56px;padding:0 2px}
.st-hour-bar{flex:1;background:rgba(204,17,34,0.35);border-radius:2px 2px 0 0;min-height:2px;cursor:default;transition:background .1s ease}
.st-hour-bar:hover{background:#CC1122}
.st-rufus-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:12px}
.st-rufus-row:last-child{border-bottom:none}
.st-rufus-rank{font-family:var(--font-mono);font-size:10px;color:rgba(255,252,246,0.28);width:16px;text-align:right;flex-shrink:0}
/* MOBILE OVERLAY */
.st-mob-ham{display:none;position:fixed;z-index:400;top:calc(10px + env(safe-area-inset-top));left:12px;width:38px;height:38px;background:#0f0f12;border:1px solid rgba(255,255,255,0.10);border-radius:9px;align-items:center;justify-content:center;flex-direction:column;gap:3px;cursor:pointer;padding:8px}
.st-mob-ham span{display:block;width:16px;height:2px;background:rgba(255,252,246,0.86);border-radius:1px}
.st-mob-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:298;opacity:0;pointer-events:none;transition:opacity 200ms ease}
.st-mob-backdrop.show{opacity:1;pointer-events:auto}
@media(max-width:768px){
  .st-app{height:100svh;height:-webkit-fill-available}
  .st-mob-ham{display:flex}
  .st-mob-backdrop{display:block}
  .st-side{position:fixed!important;left:0;top:0;bottom:0;z-index:300;width:min(300px,85vw)!important;transform:translateX(-100%);transition:transform 200ms ease;padding-top:env(safe-area-inset-top);padding-bottom:calc(8px + env(safe-area-inset-bottom))}
  .st-side.mob-open{transform:translateX(0)}
  .st-page{padding:calc(54px + env(safe-area-inset-top)) 16px calc(40px + env(safe-area-inset-bottom))!important}
  .st-kb-grid{grid-template-columns:repeat(2,1fr)}
  .st-lookup-grid{grid-template-columns:1fr}
  .st-stat-grid{grid-template-columns:repeat(2,1fr)}

}
</style>

function fmtDate(iso){try{const d=new Date(iso),now=new Date(),diff=(now-d)/1e3;if(diff<0)return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});if(diff<3600)return Math.floor(diff/60)+'m ago';if(diff<86400)return Math.floor(diff/3600)+'h ago';if(diff<2592000)return Math.floor(diff/86400)+'d ago';return d.toLocaleDateString('en-US',{month:'short',day:'numeric'})}catch{return''}}

function Login({onSignIn}){
  const[email,setEmail]=useState('');
  const[pw,setPw]=useState('');
  const[err,setErr]=useState('');
  const[loading,setLoading]=useState(false);
  const submit=async e=>{
    e.preventDefault();setErr('');setLoading(true);
    try{
      const r=await fetch('/api/admin-auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pw})});
      const d=await r.json();
      if(!r.ok){setErr(d.error||'Login failed');setLoading(false);return;}
      onSignIn(d.staff);
    }catch{setErr('Connection error. Please try again.');setLoading(false);}
  };
  return(
    <div className="st-login">
      <div className="st-login-bg"/>
      <div className="st-login-card">
        <div style={{marginBottom:22}}><img src={window.__resources.wordmarkKnockout} alt="Podium 1" style={{height:26,width:'auto',display:'block'}}/></div>

          <label className="st-label" style={{marginTop:14}}>Password</label>
          <input className="st-input" type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="••••••••" onKeyDown={e=>{if(e.key==='Enter')submit(e)}}/>

  );
}

function TicketQueue({me}){
  const[tickets,setTickets]=useState([]);

  const[showNew,setShowNew]=useState(false);

  const load=()=>{
    setLoading(true);
    fetch('/api/tickets').then(r=>r.json()).then(d=>{setTickets(d.tickets||[]);setLoading(false)}).catch(()=>setLoading(false));
  };
  useEffect(load,[]);

  const startDrag=(i,e)=>{
    e.preventDefault();
    const startX=e.clientX,startW=colW[i];
    const onMove=ev=>setColW(w=>{const n=[...w];n[i]=Math.max(60,startW+(ev.clientX-startX));return n});
    const onUp=()=>{window.removeEventListener('mousemove',onMove);window.removeEventListener('mouseup',onUp)};
    window.addEventListener('mousemove',onMove);window.addEventListener('mouseup',onUp);
  };
  const colTpl=colW.map(w=>w+'px').join(' ');
  const cols=['ID','Customer','Issue','Category','Submitted','Status','Assigned'];

  const counts=useMemo(()=>({
    all:tickets.length,

    resolved:tickets.filter(t=>t.status&&/resolv|closed/i.test(t.status)).length,
    unassigned:tickets.filter(t=>!t.assignee).length,
  }),[tickets]);

  const filtered=filter==='all'?tickets:filter==='unassigned'?tickets.filter(t=>!t.assignee):tickets.filter(t=>{
    if(filter==='open')return /open|new/i.test(t.status||'');

                    </div>
                  </button>

              </div>
            </div>
          )}
        </div>
      </div>
      {openTicket&&<TicketDetail ticket={openTicket} onClose={()=>setOpenId(null)}/>}
      {showNew&&(

            <div className="st-modal-body">

              <div className="st-form-field"><label className="st-form-label">Issue description *</label><textarea className="st-input st-textarea" rows={3} value={newForm.issue} onChange={e=>setNewForm(f=>({...f,issue:e.target.value}))} placeholder="Describe the issue the customer is experiencing…"/></div>

                <div className="st-form-field"><label className="st-form-label">Category</label><input className="st-input" value={newForm.typeOfHelp} onChange={e=>setNewForm(f=>({...f,typeOfHelp:e.target.value}))} placeholder="e.g. Motion, Software, Hardware"/></div>
                <div className="st-form-field"><label className="st-form-label">Simulator model</label><input className="st-input" value={newForm.rig} onChange={e=>setNewForm(f=>({...f,rig:e.target.value}))} placeholder="e.g. P1-X Ultimate"/></div>
              </div>
            </div>
            <div className="st-modal-actions"><button className="st-btn-ghost" onClick={()=>setShowNew(false)}>Cancel</button><button className="st-btn-primary" onClick={submit} disabled={!newForm.name||!newForm.email||!newForm.issue||saving}>{saving?<Spin/>:'Create ticket'}</button></div>

  );

const warrantyStatus=date=>{if(!date)return null;const purchased=new Date(date);const expires=new Date(purchased);expires.setFullYear(expires.getFullYear()+1);return Date.now()<expires.getTime()?'active':'inactive';};
function CustomerLookup({me}){
  const[customers,setCustomers]=useState([]);
  const[loading,setLoading]=useState(true);
  const[q,setQ]=useState('');
  const[active,setActive]=useState(null);
  const[tickets,setTickets]=useState([]);
  const[showModal,setShowModal]=useState(false);
  const[editData,setEditData]=useState({});
  const[showAddCust,setShowAddCust]=useState(false);
  const[addForm,setAddForm]=useState({name:'',email:'',password:'',rig:'',city:'',purchase_date:'',motion_platform:'',wheelbase:'',specialist_name:'',specialist_email:''});
  const[addSaving,setAddSaving]=useState(false);

  const[csvRows,setCsvRows]=useState([]);
  const[showCSV,setShowCSV]=useState(false);
  const[importing,setImporting]=useState(false);
  const[importDone,setImportDone]=useState(0);
  const csvRef=useRef(null);

  useEffect(()=>{
    fetch('/api/customers').then(r=>r.json()).then(d=>{const c=d.customers||[];setCustomers(c);if(c[0])setActive(c[0])}).catch(()=>setLoading(false));
    fetch('/api/tickets').then(r=>r.json()).then(d=>setTickets(d.tickets||[])).catch(()=>{});
    setLoading(false);
  },[]);


  const matches=q?customers.filter(c=>c.name?.toLowerCase().includes(q.toLowerCase())||c.email?.toLowerCase().includes(q.toLowerCase())||c.rig?.toLowerCase().includes(q.toLowerCase())):customers;
  const custTickets=active?tickets.filter(t=>t.email&&active.email&&t.email.toLowerCase()===active.email.toLowerCase()):[];

  const save=async()=>{
    await fetch('/api/customers',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'update',email:active.email,data:editData})});
    setCustomers(c=>c.map(x=>x.email===active.email?{...x,...editData}:x));
    setActive(a=>({...a,...editData}));
    setShowModal(false);
  };

  const addCustomer=async()=>{
    if(!addForm.name||!addForm.email)return;
    setAddSaving(true);
    await fetch('/api/customers',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'create',...addForm})});
    setAddSaving(false);setShowAddCust(false);
    setAddForm({name:'',email:'',password:'',rig:'',city:'',purchase_date:'',motion_platform:'',wheelbase:'',specialist_name:'',specialist_email:''});
    fetch('/api/customers').then(r=>r.json()).then(d=>{const c=d.customers||[];setCustomers(c)});
  };

  const parseCSV=text=>{
    const lines=text.trim().split(/\r?\n/);
    if(lines.length<2)return[];
    const headers=lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,'').toLowerCase());
    return lines.slice(1).filter(l=>l.trim()).map(l=>{
      const vals=[];let cur='',inQ=false;
      for(const ch of l){if(ch==='"'){inQ=!inQ}else if(ch===','&&!inQ){vals.push(cur.trim());cur=''}else{cur+=ch}}
      vals.push(cur.trim());
      const row={};headers.forEach((h,i)=>row[h]=vals[i]||'');
      return row;
    });
  };

  const handleCSVFile=e=>{
    const file=e.target.files?.[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{const rows=parseCSV(ev.target.result);setCsvRows(rows);setShowCSV(true);setImportDone(0)};
    reader.readAsText(file);
    e.target.value='';
  };

  const importCSV=async()=>{
    setImporting(true);let done=0;
    for(const row of csvRows){
      if(!row.email&&!row.name)continue;
      await fetch('/api/customers',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'create',name:row.name||'',email:row.email||'',rig:row.rig||row.simulator||'',city:row.city||'',purchase_date:row.purchase_date||row['purchase date']||'',motion_platform:row.motion_platform||row['motion platform']||'',wheelbase:row.wheelbase||''})}).catch(()=>{});
      done++;setImportDone(done);
    }
    setImporting(false);
    fetch('/api/customers').then(r=>r.json()).then(d=>setCustomers(d.customers||[]));
    setTimeout(()=>setShowCSV(false),1000);
  };

  return(
    <div className="st-page">
      <PageHead eyebrow="SUPPORT · LOOKUP" title="Customer lookup" sub="Search by name, email, or rig type."
        right={<div style={{display:'flex',gap:8}}><button className="st-btn-ghost" onClick={()=>csvRef.current?.click()}><I.Plus width="13" height="13"/>Import CSV</button><input ref={csvRef} type="file" accept=".csv,text/csv" style={{display:'none'}} onChange={handleCSVFile}/><button className="st-btn-primary" onClick={()=>setShowAddCust(true)}><I.Plus width="13" height="13"/>Add customer</button></div>}
      />
      <div className="st-search-big"><I.Search width="16" height="16"/><input className="st-search-input" placeholder="Search customers, emails…" value={q} onChange={e=>setQ(e.target.value)} autoFocus/></div>
      {loading&&<div className="st-loading"><Spin/> Loading…</div>}
      {!loading&&(
        <div className="st-lookup-grid">
          <div className="st-lookup-list">
            <div className="st-lookup-list-head">{matches.length} match{matches.length!==1?'es':''}</div>
            {matches.map(c=>(
              <button key={c.email||c.id} className={`st-lookup-row${active?.email===c.email?' on':''}`} onClick={()=>setActive(c)}>
                <Av initials={initials(c.name)} size={28}/>
                <div className="st-lookup-row-text"><div className="st-lookup-row-name">{c.name}</div><div className="st-lookup-row-meta">{c.email}</div></div>
              </button>
            ))}
            {matches.length===0&&<div className="st-empty">No customers found.</div>}
          </div>
          {active&&(
            <div className="st-customer-card">
              <div className="st-customer-head">
                <Av initials={initials(active.name)} size={52}/>
                <div className="st-customer-head-text">
                  <div className="st-customer-name">{active.name}</div>
                  <div className="st-customer-meta"><span><I.Mail width="11" height="11"/>{active.email}</span>{active.city&&<span>{active.city}</span>}</div>
                </div>
                <button className="st-btn-ghost st-btn-sm" onClick={()=>{setEditData({name:active.name||'',email:active.email||'',city:active.city||'',rig:active.rig||'',purchase_date:active.purchase_date||'',motion_platform:active.motion_platform||'',wheelbase:active.wheelbase||'',specialist_name:active.specialist_name||'',specialist_email:active.specialist_email||''});setShowModal(true)}}><I.Edit/>Edit</button>
              </div>
              <div className="st-customer-stats">
                {active.rig&&<div className="st-cstat"><div className="st-cstat-l">Simulator</div><div className="st-cstat-v">{active.rig}</div></div>}
                {active.purchase_date&&<div className="st-cstat"><div className="st-cstat-l">Purchased</div><div className="st-cstat-v">{active.purchase_date}</div></div>}
                {active.purchase_date&&(()=>{const ws=warrantyStatus(active.purchase_date);return(<div className="st-cstat"><div className="st-cstat-l">Warranty</div><div className="st-cstat-v" style={{display:'flex',alignItems:'center',gap:6}}><span style={{width:7,height:7,borderRadius:'50%',background:ws==='active'?'#22c55e':'rgba(255,252,246,0.25)',display:'inline-block',flexShrink:0}}/>{ws==='active'?'Active':'Expired'}</div></div>);})()}
                <div className="st-cstat"><div className="st-cstat-l">Tickets</div><div className="st-cstat-v">{custTickets.length}</div></div>
                {active.motion_platform&&<div className="st-cstat"><div className="st-cstat-l">Motion</div><div className="st-cstat-v">{active.motion_platform}</div></div>}
                {active.wheelbase&&<div className="st-cstat"><div className="st-cstat-l">Wheelbase</div><div className="st-cstat-v">{active.wheelbase}</div></div>}
                {(active.specialist_name||active.specialist_email)&&<div className="st-cstat"><div className="st-cstat-l">Specialist</div><div className="st-cstat-v">{active.specialist_name||active.specialist_email}</div></div>}
              </div>
              {custTickets.length>0&&(
                <div className="st-customer-section">
                  <div className="st-customer-section-head"><h3>Ticket history</h3><span style={{fontSize:11,color:'rgba(255,252,246,0.40)'}}>{custTickets.length} total</span></div>
                  <div className="st-mini-table">
                    {custTickets.slice(0,5).map(t=>(
                      <div key={t.id} className="st-mini-row">
                        <span className="st-row-id mono">{t.ticketNum||t.id}</span>
                        <span className="st-mini-text">{t.issue||t.name||'—'}</span>
                        {t.typeOfHelp&&<Pill tone="ghost">{t.typeOfHelp}</Pill>}
                        <Pill tone={statusTone(t.status||'')} dot>{t.status||'Open'}</Pill>
                        <span className="st-mini-date mono">{t.date||''}</span>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          )}
        </div>
      )}
      {showModal&&(
        <div className="st-overlay" onClick={()=>setShowModal(false)}>
          <div className="st-modal" style={{maxWidth:560}} onClick={e=>e.stopPropagation()}>
            <div className="st-modal-head"><span className="st-modal-title">Edit customer — {active?.name}</span><button className="st-icon-btn" onClick={()=>setShowModal(false)}><I.X width="13" height="13"/></button></div>
            <div className="st-modal-body">
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                <div className="st-form-field"><label className="st-form-label">Name</label><input className="st-input" value={editData.name||''} onChange={e=>setEditData(d=>({...d,name:e.target.value}))} placeholder="Jane Smith"/></div>
                <div className="st-form-field"><label className="st-form-label">Email</label><input className="st-input" type="email" value={editData.email||''} onChange={e=>setEditData(d=>({...d,email:e.target.value}))} placeholder="jane@example.com"/></div>
                <div className="st-form-field"><label className="st-form-label">City</label><input className="st-input" value={editData.city||''} onChange={e=>setEditData(d=>({...d,city:e.target.value}))} placeholder="Nashville, TN"/></div>
                <div className="st-form-field"><label className="st-form-label">Purchase date</label><input className="st-input" value={editData.purchase_date||''} onChange={e=>setEditData(d=>({...d,purchase_date:e.target.value}))} placeholder="2024-06-15"/></div>
                <div className="st-form-field"><label className="st-form-label">Simulator model</label><input className="st-input" value={editData.rig||''} onChange={e=>setEditData(d=>({...d,rig:e.target.value}))} placeholder="P1-X Ultimate"/></div>
                <div className="st-form-field"><label className="st-form-label">Wheelbase</label><input className="st-input" value={editData.wheelbase||''} onChange={e=>setEditData(d=>({...d,wheelbase:e.target.value}))} placeholder="Fanatec DD2"/></div>
                <div className="st-form-field" style={{gridColumn:'1/-1'}}><label className="st-form-label">Motion platform</label><input className="st-input" value={editData.motion_platform||''} onChange={e=>setEditData(d=>({...d,motion_platform:e.target.value}))} placeholder="Simtag 6DOF"/></div>
                <div className="st-form-field"><label className="st-form-label">Specialist name</label><input className="st-input" value={editData.specialist_name||''} onChange={e=>setEditData(d=>({...d,specialist_name:e.target.value}))} placeholder="Nathaniel Thorpe"/></div>
                <div className="st-form-field"><label className="st-form-label">Specialist email</label><input className="st-input" type="email" value={editData.specialist_email||''} onChange={e=>setEditData(d=>({...d,specialist_email:e.target.value}))} placeholder="nathaniel@podium1racing.com"/></div>
              </div>
            </div>
            <div className="st-modal-actions"><button className="st-btn-ghost" onClick={()=>setShowModal(false)}>Cancel</button><button className="st-btn-primary" onClick={save}>Save changes</button></div>
          </div>
        </div>
      )}
      {showAddCust&&(
        <div className="st-overlay" onClick={()=>setShowAddCust(false)}>
          <div className="st-modal" style={{maxWidth:560}} onClick={e=>e.stopPropagation()}>
            <div className="st-modal-head"><span className="st-modal-title">Add new customer</span><button className="st-icon-btn" onClick={()=>setShowAddCust(false)}><I.X width="13" height="13"/></button></div>
            <div className="st-modal-body">
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                <div className="st-form-field"><label className="st-form-label">Name *</label><input className="st-input" value={addForm.name} onChange={e=>setAddForm(f=>({...f,name:e.target.value}))} placeholder="Jane Smith" autoFocus/></div>
                <div className="st-form-field"><label className="st-form-label">Email *</label><input className="st-input" type="email" value={addForm.email} onChange={e=>setAddForm(f=>({...f,email:e.target.value}))} placeholder="jane@example.com"/></div>
                <div className="st-form-field"><label className="st-form-label">Password *</label><input className="st-input" type="text" value={addForm.password} onChange={e=>setAddForm(f=>({...f,password:e.target.value}))} placeholder="Temporary password"/></div>
                <div className="st-form-field"><label className="st-form-label">City</label><input className="st-input" value={addForm.city} onChange={e=>setAddForm(f=>({...f,city:e.target.value}))} placeholder="Nashville, TN"/></div>
                <div className="st-form-field"><label className="st-form-label">Purchase date</label><input className="st-input" value={addForm.purchase_date} onChange={e=>setAddForm(f=>({...f,purchase_date:e.target.value}))} placeholder="2024-06-15"/></div>
                <div className="st-form-field"><label className="st-form-label">Simulator model</label><input className="st-input" value={addForm.rig} onChange={e=>setAddForm(f=>({...f,rig:e.target.value}))} placeholder="P1-X Ultimate"/></div>
                <div className="st-form-field"><label className="st-form-label">Wheelbase</label><input className="st-input" value={addForm.wheelbase} onChange={e=>setAddForm(f=>({...f,wheelbase:e.target.value}))} placeholder="Fanatec DD2"/></div>
                <div className="st-form-field" style={{gridColumn:'1/-1'}}><label className="st-form-label">Motion platform</label><input className="st-input" value={addForm.motion_platform} onChange={e=>setAddForm(f=>({...f,motion_platform:e.target.value}))} placeholder="Simtag 6DOF"/></div>
                <div className="st-form-field"><label className="st-form-label">Specialist name</label><input className="st-input" value={addForm.specialist_name} onChange={e=>setAddForm(f=>({...f,specialist_name:e.target.value}))} placeholder="Nathaniel Thorpe"/></div>
                <div className="st-form-field"><label className="st-form-label">Specialist email</label><input className="st-input" type="email" value={addForm.specialist_email} onChange={e=>setAddForm(f=>({...f,specialist_email:e.target.value}))} placeholder="nathaniel@podium1racing.com"/></div>
              </div>
            </div>
            <div className="st-modal-actions"><button className="st-btn-ghost" onClick={()=>setShowAddCust(false)}>Cancel</button><button className="st-btn-primary" onClick={addCustomer} disabled={!addForm.name||!addForm.email||!addForm.password||addSaving}>{addSaving?<Spin/>:'Add customer'}</button></div>
          </div>
        </div>
      )}
      {showCSV&&(
        <div className="st-overlay" onClick={()=>{if(!importing)setShowCSV(false)}}>
          <div className="st-modal" style={{maxWidth:560}} onClick={e=>e.stopPropagation()}>
            <div className="st-modal-head"><span className="st-modal-title">Import CSV — {csvRows.length} rows</span><button className="st-icon-btn" onClick={()=>setShowCSV(false)} disabled={importing}><I.X width="13" height="13"/></button></div>
            <div style={{maxHeight:260,overflowY:'auto',marginBottom:14,background:'rgba(255,255,255,0.02)',border:'1px solid rgba(255,255,255,0.06)',borderRadius:8}}>
              {csvRows.slice(0,20).map((r,i)=>(
                <div key={i} style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,padding:'7px 12px',borderTop:i?'1px solid rgba(255,255,255,0.04)':'none',fontSize:12}}>
                  <span style={{color:'#fff',fontWeight:500}}>{r.name||'—'}</span>
                  <span style={{color:'rgba(255,252,246,0.50)'}}>{r.email||'—'}</span>
                </div>
              ))}
              {csvRows.length>20&&<div style={{padding:'6px 12px',fontSize:11,color:'rgba(255,252,246,0.40)'}}>+{csvRows.length-20} more rows</div>}
            </div>
            <p style={{fontSize:12,color:'rgba(255,252,246,0.50)',marginBottom:14}}>Expected columns: <code style={{fontFamily:'var(--font-mono)',fontSize:11}}>name, email, rig, city, purchase_date, wheelbase</code></p>
            {importing&&<div style={{fontSize:12,color:'rgba(255,252,246,0.62)',marginBottom:10}}>Importing… {importDone} / {csvRows.length}</div>}
            <div className="st-modal-actions"><button className="st-btn-ghost" onClick={()=>setShowCSV(false)} disabled={importing}>Cancel</button><button className="st-btn-primary" onClick={importCSV} disabled={importing||csvRows.length===0}>{importing?<Spin/>:`Import ${csvRows.length} customers`}</button></div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── SEARCH MODAL ─────────────────────────────────────────────────────────
function SearchModal({onClose,setTab}){
  const[q,setQ]=useState('');
  const[tickets,setTickets]=useState([]);
  const[customers,setCustomers]=useState([]);
  const[kb,setKb]=useState([]);
  const ref=useRef(null);
  useEffect(()=>{
    ref.current?.focus();
    fetch('/api/tickets').then(r=>r.json()).then(d=>setTickets(d.tickets||[])).catch(()=>{});
    fetch('/api/customers').then(r=>r.json()).then(d=>setCustomers(d.customers||[])).catch(()=>{});
    fetch('/api/kb').then(r=>r.json()).then(d=>setKb(d.files||[])).catch(()=>{});
  },[]);
  useEffect(()=>{const h=e=>{if(e.key==='Escape')onClose()};window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);},[onClose]);
  const sq=q.toLowerCase().trim();
  const mT=sq?tickets.filter(t=>t.name?.toLowerCase().includes(sq)||t.email?.toLowerCase().includes(sq)||t.issue?.toLowerCase().includes(sq)).slice(0,4):[];
  const mC=sq?customers.filter(c=>c.name?.toLowerCase().includes(sq)||c.email?.toLowerCase().includes(sq)||c.rig?.toLowerCase().includes(sq)).slice(0,4):[];
  const mK=sq?kb.filter(f=>f.name?.toLowerCase().includes(sq)).slice(0,4):[];
  const noResults=sq&&mT.length===0&&mC.length===0&&mK.length===0;
  const go=t=>{setTab(t);onClose()};
  return(
    <div className="st-overlay" style={{alignItems:'flex-start',paddingTop:'12vh'}} onClick={onClose}>
      <div className="st-search-modal" onClick={e=>e.stopPropagation()}>
        <div className="st-search-modal-bar">
          <I.Search width="15" height="15" style={{color:'rgba(255,252,246,0.45)',flexShrink:0}}/>
          <input ref={ref} value={q} onChange={e=>setQ(e.target.value)} placeholder="Search tickets, customers, articles…" autoComplete="off"/>
          <kbd style={{fontFamily:'var(--font-mono)',fontSize:10,padding:'2px 6px',borderRadius:4,background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.08)',color:'rgba(255,252,246,0.35)'}}>ESC</kbd>
        </div>
        {sq&&(
          <div className="st-search-results">
            {noResults&&<div className="st-search-empty">No results for "{q}"</div>}
            {mT.length>0&&<><div className="st-search-sect">Tickets</div>{mT.map(t=><button key={t.id||t.ticketNum} className="st-search-result" onClick={()=>go('queue')}><I.Inbox width="13" height="13"/><span style={{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.name||t.email||'Unknown'}</span><span className="st-search-result-meta">{t.issue?.slice(0,50)||t.typeOfHelp||'—'}</span></button>)}</>}
            {mC.length>0&&<><div className="st-search-sect">Customers</div>{mC.map(c=><button key={c.email||c.id} className="st-search-result" onClick={()=>go('customers')}><I.User width="13" height="13"/><span style={{flex:1}}>{c.name}</span><span className="st-search-result-meta">{c.email}</span></button>)}</>}
            {mK.length>0&&<><div className="st-search-sect">Knowledge Base</div>{mK.map(f=><button key={f.id} className="st-search-result" onClick={()=>go('kb')}><I.Book width="13" height="13"/><span style={{flex:1}}>{f.name}</span><span className="st-search-result-meta">{f.category||'Article'}</span></button>)}</>}
          </div>
        )}
        {!sq&&<div className="st-search-hints"><span>Start typing to search</span><span style={{marginLeft:'auto'}}>ESC to close</span></div>}
      </div>
    </div>
  );
}

// ── CONVERSATIONS ─────────────────────────────────────────────────────────
function Conversations(){
  const[convs,setConvs]=useState([]);
  const[loading,setLoading]=useState(true);
  const[expanded,setExpanded]=useState({});
  const[sessExp,setSessExp]=useState({});
  useEffect(()=>{fetch('/api/conversations').then(r=>r.json()).then(d=>{setConvs(d.conversations||[]);setLoading(false)}).catch(()=>setLoading(false))},[]);

  const custMap=useMemo(()=>{
    const m={};
    convs.forEach(c=>{
      const email=c.customer_email||'unknown';
      const date=(c.created_at||'').slice(0,10);
      if(!m[email])m[email]={email,name:c.customer_name||email,latestTs:'',sessions:{},totalMsgs:0};
      const sk=email+'|'+date;
      if(!m[email].sessions[sk])m[email].sessions[sk]={date,msgs:[],latestTs:''};
      m[email].sessions[sk].msgs.push(c);
      m[email].totalMsgs++;
      const ts=c.created_at||'';
      if(ts>m[email].latestTs)m[email].latestTs=ts;
      if(ts>m[email].sessions[sk].latestTs)m[email].sessions[sk].latestTs=ts;
    });
    return m;
  },[convs]);

  const custList=useMemo(()=>Object.values(custMap).sort((a,b)=>b.latestTs.localeCompare(a.latestTs)),[custMap]);

  useEffect(()=>{
    if(custList.length>0&&Object.keys(expanded).length===0){
      const first=custList[0].email;
      setExpanded({[first]:true});
      const firstSess=Object.values(custList[0].sessions||{})[0];
      if(firstSess)setSessExp({[first+'|'+firstSess.date]:true});
    }
  },[custList]);

  const toggleCust=email=>setExpanded(e=>({...e,[email]:!e[email]}));
  const toggleSess=sk=>setSessExp(s=>({...s,[sk]:s[sk]===false?true:false}));

  return(
    <div className="st-page">
      <PageHead eyebrow="SUPPORT · RUFUS" title="Conversations" sub={`${custList.length} customer${custList.length!==1?'s':''} · ${convs.length} total messages`}/>
      {loading&&<div className="st-loading"><Spin/> Loading conversations…</div>}
      {!loading&&custList.map(cust=>{
        const isOpen=!!expanded[cust.email];
        const sessArr=Object.values(cust.sessions).sort((a,b)=>b.latestTs.localeCompare(a.latestTs));
        return(
          <div key={cust.email} className="st-conv-customer">
            <button className="st-conv-cust-head" onClick={()=>toggleCust(cust.email)}>
              <Av initials={initials(cust.name)} size={28}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13,fontWeight:600,color:'#fff',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{cust.name}</div>
                <div style={{fontSize:11,color:'rgba(255,252,246,0.45)'}}>{cust.email}</div>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
                <Pill tone="ghost">{sessArr.length} session{sessArr.length!==1?'s':''}</Pill>
                <span style={{fontSize:11,color:'rgba(255,252,246,0.35)',fontFamily:'var(--font-mono)'}}>{cust.totalMsgs} msgs</span>
                <I.ChevD width="13" height="13" style={{color:'rgba(255,252,246,0.40)',transform:isOpen?'rotate(180deg)':'none',transition:'transform .2s ease',flexShrink:0}}/>
              </div>
            </button>
            {isOpen&&(
              <div className="st-conv-sess-body">
                {sessArr.map(sess=>{
                  const sk=cust.email+'|'+sess.date;
                  const sessOpen=sessExp[sk]!==false;
                  return(
                    <div key={sk} style={{marginBottom:6}}>
                      <button className="st-conv-sess-toggle" onClick={()=>toggleSess(sk)}>
                        <I.ChevD width="10" height="10" style={{transform:sessOpen?'none':'rotate(-90deg)',transition:'transform .2s ease'}}/>
                        SESSION · {sess.date}
                        <span style={{marginLeft:'auto',fontWeight:400}}>{sess.msgs.length} messages</span>
                      </button>
                      {sessOpen&&sess.msgs.map((m,j)=>(
                        <div key={j} className={`st-conv-msg${m.role==='user'?' user':''}`}>
                          {m.role!=='user'&&<Av initials="RF" size={22} tone="blue"/>}
                          <div className={`st-conv-bubble ${m.role==='user'?'st-conv-bubble-u':'st-conv-bubble-a'}`}>{m.content||m.message||''}</div>
                          {m.role==='user'&&<Av initials={initials(m.customer_name||m.customer_email||'?')} size={22}/>}
                        </div>
                      ))}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        );
      })}
      {!loading&&custList.length===0&&<div className="st-empty">No conversations yet.</div>}
    </div>
  );
}

// ── NEWS MANAGER ──────────────────────────────────────────────────────────

// ── KB MANAGER ────────────────────────────────────────────────────────────
function KBManager(){
  const[files,setFiles]=useState([]);
  const[loading,setLoading]=useState(true);
  const[view,setView]=useState('list');
  const[videos,setVideos]=useState([]);
  const[showAddVideo,setShowAddVideo]=useState(false);

  const[artForm,setArtForm]=useState({title:'',url:'',category:'',notes:''});

  const loadVideos=()=>fetch('/api/kb-videos').then(r=>r.json()).then(d=>setVideos(d.videos||[])).catch(()=>{});
  useEffect(()=>{
    fetch('/api/kb').then(r=>r.json()).then(d=>{setFiles(d.files||[]);setLoading(false)}).catch(()=>setLoading(false));
    loadVideos();
  },[]);

  const getThumb=url=>{const id=url?.match(/\/d\/([^/]+)/)?.[1];return id?`https://drive.google.com/thumbnail?id=${id}&sz=w400`:null};
  const getYTEmbed=url=>{const m=url?.match(/(?:v=|youtu\.be\/|embed\/)([A-Za-z0-9_-]{11})/);return m?`https://www.youtube.com/embed/${m[1]}?rel=0`:null};

  const addVideo=async()=>{
    setSavingVideo(true);

    if(!confirm('Delete this article?'))return;

              <div><Pill tone="ghost">{f.category||'General'}</Pill></div>

    </div>

function AnalyticsChart({tickets,deflected}){
  const max=30;const w=760;const h=200;const pad=24;
  const xStep=(w-pad*2)/(tickets.length-1);
  const y=v=>h-pad-(v/max)*(h-pad*2);
  const line=arr=>arr.map((v,i)=>`${pad+i*xStep},${y(v)}`).join(' ');
  const area=arr=>`M ${pad},${h-pad} L ${arr.map((v,i)=>`${pad+i*xStep},${y(v)}`).join(' L ')} L ${w-pad},${h-pad} Z`;
  return(
    <svg viewBox={`0 0 ${w} ${h}`} className="st-chart" preserveAspectRatio="none">
      {[0,.25,.5,.75,1].map((p,i)=><line key={i} x1={pad} x2={w-pad} y1={pad+p*(h-pad*2)} y2={pad+p*(h-pad*2)} stroke="rgba(255,255,255,0.04)" strokeDasharray="2 4"/>)}
      <path d={area(deflected)} fill="rgba(255,255,255,0.025)"/>
      <polyline points={line(deflected)} fill="none" stroke="rgba(255,252,246,0.30)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
      <path d={area(tickets)} fill="rgba(204,17,34,0.08)"/>
      <polyline points={line(tickets)} fill="none" stroke="#CC1122" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
      {tickets.map((v,i)=><circle key={i} cx={pad+i*xStep} cy={y(v)} r="2.5" fill="#0a0a0c" stroke="#CC1122" strokeWidth="1.5"/>)}
    </svg>
  );
}
