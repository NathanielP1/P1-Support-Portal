<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Podium 1 Racing — Owner Support</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&family=DM+Mono:wght@400;500&display=swap');
:root{--bg-deep:#080808;--bg-surface:#0E0E0E;--bg-raised:#141414;--red:#CC1122;--text-primary:#FFFCF6;--text-muted:rgba(255,252,246,0.62);--text-faint:rgba(255,252,246,0.40);--font-display:'Bebas Neue','Impact',sans-serif;--font-body:'DM Sans',system-ui,sans-serif;--font-mono:'DM Mono','JetBrains Mono',monospace}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%}
body{font-family:var(--font-body);background:#070708;color:var(--text-primary);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;letter-spacing:-0.005em;overflow:hidden}
button,input,textarea,select{font-family:inherit;color:inherit}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:3px}::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.16)}
.mono{font-family:var(--font-mono)}
/* LOGIN */
.lin-login{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;overflow:hidden;background:#060608}
.lin-login-bg{position:absolute;inset:0;background:radial-gradient(circle at 50% -10%,rgba(204,17,34,0.18),transparent 55%);pointer-events:none}
.lin-login-bg2{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.025) 1px,transparent 1px);background-size:48px 48px;mask-image:radial-gradient(circle at 50% 40%,#000,transparent 70%);-webkit-mask-image:radial-gradient(circle at 50% 40%,#000,transparent 70%);pointer-events:none;opacity:0.6}
.lin-login-card{position:relative;width:400px;max-width:100%;background:linear-gradient(180deg,rgba(255,255,255,0.04),rgba(255,255,255,0.01));border:1px solid rgba(255,255,255,0.07);border-radius:14px;padding:36px 36px 28px;box-shadow:0 30px 80px rgba(0,0,0,0.5);animation:fadeUp .5s cubic-bezier(.4,0,.2,1) both}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.lin-login-eyebrow{font-family:var(--font-display);font-size:11px;letter-spacing:0.2em;color:rgba(255,252,246,0.40);margin-bottom:14px}
.lin-login-h1{font-size:26px;font-weight:600;letter-spacing:-0.5px;margin-bottom:6px}
.lin-login-sub{font-size:13px;color:rgba(255,252,246,0.62);margin-bottom:24px;line-height:1.55}
.lin-label{display:block;font-size:11px;font-weight:500;color:rgba(255,252,246,0.62);margin-bottom:6px}
.lin-input{display:block;width:100%;padding:9px 12px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:7px;font-size:13px;color:var(--text-primary);outline:none;transition:all .15s ease}
.lin-input:focus{border-color:rgba(204,17,34,0.55);background:rgba(204,17,34,0.04);box-shadow:0 0 0 3px rgba(204,17,34,0.10)}
.lin-input::placeholder{color:rgba(255,252,246,0.30)}
.lin-textarea{resize:vertical;min-height:120px;line-height:1.55;font-family:inherit;padding:11px 12px}
.lin-login-err{background:rgba(204,17,34,0.10);border:1px solid rgba(204,17,34,0.25);color:#f8505f;font-size:12px;padding:9px 12px;border-radius:7px;margin-bottom:14px}
.lin-login-foot{margin-top:18px;text-align:center;font-size:11px;color:rgba(255,252,246,0.40);padding-top:18px;border-top:1px solid rgba(255,255,255,0.05)}
.lin-login-foot a{color:rgba(255,252,246,0.78);text-decoration:none}
.lin-login-meta{position:relative;margin-top:18px;display:flex;gap:14px;font-size:11px;color:rgba(255,252,246,0.30);font-family:var(--font-mono)}
/* BUTTONS */
.lin-btn-primary{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:9px 14px;background:#CC1122;border:1px solid rgba(255,255,255,0.08);color:#fff;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s ease;letter-spacing:-0.005em;position:relative}
.lin-btn-primary::after{content:'';position:absolute;inset:0;border-radius:7px;background:linear-gradient(180deg,rgba(255,255,255,0.18),transparent 50%);pointer-events:none}
.lin-btn-primary:hover{background:#e0162a;box-shadow:0 6px 24px rgba(204,17,34,0.40)}
.lin-btn-primary:disabled{background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.3);cursor:not-allowed;box-shadow:none}
.lin-btn-primary:disabled::after{display:none}
.lin-btn-ghost{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 14px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);color:rgba(255,252,246,0.86);border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s ease}
.lin-btn-ghost:hover{background:rgba(255,255,255,0.06);border-color:rgba(255,255,255,0.14)}
.lin-btn-block{display:flex;width:100%}
.lin-btn-sm{padding:6px 11px;font-size:12px}
.lin-icon-btn{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;background:transparent;border:1px solid transparent;color:rgba(255,252,246,0.62);border-radius:6px;cursor:pointer;transition:all .15s ease}
.lin-icon-btn:hover{background:rgba(255,255,255,0.05);color:#fff;border-color:rgba(255,255,255,0.08)}
/* PILLS */
.lin-pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:5px;font-size:11px;font-weight:500;border:1px solid transparent}
.lin-pill-amber{background:rgba(245,158,11,0.10);color:#f59e0b;border-color:rgba(245,158,11,0.18)}
.lin-pill-green{background:rgba(34,197,94,0.10);color:#22c55e;border-color:rgba(34,197,94,0.18)}
.lin-pill-blue{background:rgba(96,165,250,0.10);color:#60a5fa;border-color:rgba(96,165,250,0.18)}
.lin-pill-red{background:rgba(204,17,34,0.10);color:#f8505f;border-color:rgba(204,17,34,0.20)}
.lin-pill-ghost{background:rgba(255,255,255,0.04);color:rgba(255,252,246,0.62);border-color:rgba(255,255,255,0.08)}
.lin-kbd{margin-left:auto;font-family:var(--font-mono);font-size:10px;padding:1px 6px;border-radius:4px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.07);color:rgba(255,252,246,0.40);min-width:22px;text-align:center}
.lin-dot{display:inline-block;width:6px;height:6px;border-radius:50%;flex-shrink:0}
.lin-dot-green{background:#22c55e;box-shadow:0 0 6px rgba(34,197,94,0.5)}
.lin-dot-grey{background:rgba(255,252,246,0.25)}
.lin-avatar{display:inline-flex;align-items:center;justify-content:center;border-radius:50%;background:linear-gradient(135deg,#5a060e,#cc1122);color:#fff;font-weight:600;flex-shrink:0;border:1px solid rgba(255,255,255,0.08)}
/* APP SHELL */
.lin-app{display:flex;height:100vh;height:100dvh;overflow:hidden}
/* SIDEBAR */
.lin-side{flex-shrink:0;background:#08080a;border-right:1px solid rgba(255,255,255,0.05);display:flex;flex-direction:column;padding:8px;gap:4px;transition:width 200ms ease;overflow:hidden}
.lin-side-top{padding:4px;display:flex;align-items:center;gap:6px;min-height:44px}
.lin-hamburger{display:flex;flex-direction:column;justify-content:center;gap:3px;width:26px;height:26px;background:transparent;border:1px solid transparent;border-radius:6px;cursor:pointer;padding:4px;flex-shrink:0;transition:all .15s ease}
.lin-hamburger:hover{background:rgba(255,255,255,0.05)}
.lin-hamburger span{display:block;width:18px;height:2px;background:rgba(255,252,246,0.62);border-radius:1px}
.lin-org{display:flex;align-items:center;gap:8px;padding:4px 6px;background:transparent;border:1px solid transparent;border-radius:7px;cursor:default;flex:1;min-width:0;overflow:hidden}
.lin-org-text{flex:1;text-align:left;display:flex;flex-direction:column;gap:1px;min-width:0}
.lin-org-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lin-org-sub{font-size:11px;color:rgba(255,252,246,0.40);white-space:nowrap}
.lin-side-search{display:flex;align-items:center;gap:8px;padding:6px 10px;margin:0 2px 4px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:7px;font-size:12px;color:rgba(255,252,246,0.40);cursor:pointer;white-space:nowrap;overflow:hidden;transition:all .15s ease}
.lin-side-search:hover{background:rgba(255,255,255,0.05);color:rgba(255,252,246,0.62)}
.lin-nav{display:flex;flex-direction:column;gap:1px;padding:0 2px}
.lin-nav-item{display:flex;align-items:center;gap:9px;padding:6px 9px;background:transparent;border:none;color:rgba(255,252,246,0.62);font-size:13px;font-weight:500;border-radius:6px;cursor:pointer;transition:all .12s ease;text-align:left;width:100%;white-space:nowrap;overflow:hidden;position:relative}
.lin-nav-item:hover{background:rgba(255,255,255,0.04);color:rgba(255,252,246,0.86)}
.lin-nav-item.on{background:rgba(255,255,255,0.06);color:#fff}
.lin-nav-item.on svg{color:#fff}
.lin-nav-item svg{color:rgba(255,252,246,0.50);flex-shrink:0}
.lin-nav-item .lbl{flex:1}
.lin-side-section{font-size:10px;font-weight:500;color:rgba(255,252,246,0.30);padding:16px 12px 4px;letter-spacing:0.08em;white-space:nowrap;overflow:hidden}
.lin-rig-card{margin:0 4px;padding:10px 12px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);border-radius:8px}
.lin-rig-row{display:flex;justify-content:space-between;font-size:11px;padding:2px 0}
.lin-rig-key{color:rgba(255,252,246,0.40)}
.lin-rig-val{color:rgba(255,252,246,0.86);font-weight:500;display:flex;align-items:center;gap:5px}
.lin-side-foot{margin-top:auto;padding:10px 6px 6px;border-top:1px solid rgba(255,255,255,0.05);display:flex;align-items:center;gap:8px;overflow:hidden}
.lin-side-user{flex:1;min-width:0}
.lin-side-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lin-side-email{font-size:11px;color:rgba(255,252,246,0.40);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lin-nav-tooltip{position:absolute;left:calc(100% + 10px);top:50%;transform:translateY(-50%);background:#1a1a1f;border:1px solid rgba(255,255,255,0.10);border-radius:6px;padding:4px 9px;font-size:12px;color:#fff;white-space:nowrap;pointer-events:none;opacity:0;z-index:100;transition:opacity .1s ease}
.lin-nav-item:hover .lin-nav-tooltip{opacity:1}
/* ANNOUNCEMENTS */
.lin-announce{display:flex;align-items:center;gap:10px;padding:10px 16px;background:rgba(204,17,34,0.07);border-bottom:1px solid rgba(204,17,34,0.15);font-size:12px;color:rgba(255,252,246,0.86);flex-shrink:0}
.lin-announce-close{margin-left:auto;background:transparent;border:none;color:rgba(255,252,246,0.40);cursor:pointer;font-size:16px;line-height:1;padding:2px 4px}
.lin-announce-close:hover{color:#fff}
/* MAIN */
.lin-main-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.lin-main{flex:1;overflow-y:auto;background:#0a0a0c}
.lin-page{max-width:1100px;margin:0 auto;padding:40px 48px 80px;animation:pageIn .25s ease both}
@keyframes pageIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.lin-pagehead{display:flex;align-items:flex-start;justify-content:space-between;gap:24px;margin-bottom:32px;flex-wrap:wrap}
.lin-pagehead-right{flex-shrink:0}
.lin-eyebrow{font-family:var(--font-display);font-size:11px;letter-spacing:0.2em;color:rgba(255,252,246,0.40);margin-bottom:10px}
.lin-h1{font-size:32px;font-weight:600;letter-spacing:-0.8px;line-height:1.15}
.lin-h1-grad{background:linear-gradient(135deg,#fff,rgba(204,17,34,0.95));-webkit-background-clip:text;background-clip:text;color:transparent}
.lin-pagesub{font-size:14px;color:rgba(255,252,246,0.62);margin-top:8px;max-width:560px;line-height:1.6}
.lin-back{display:inline-flex;align-items:center;gap:6px;padding:5px 9px 5px 6px;background:transparent;border:1px solid transparent;border-radius:6px;color:rgba(255,252,246,0.62);font-size:12px;cursor:pointer;margin-bottom:18px;transition:all .15s ease}
.lin-back:hover{background:rgba(255,255,255,0.04);color:#fff}
/* HOME */
.lin-quick{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:32px}
.lin-tile{display:flex;align-items:center;gap:12px;padding:14px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:10px;cursor:pointer;text-align:left;transition:all .15s ease;font-family:inherit;color:inherit}
.lin-tile:hover{background:rgba(255,255,255,0.04);border-color:rgba(255,255,255,0.10);transform:translateY(-1px)}
.lin-tile-mark{width:32px;height:32px;border-radius:7px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;color:rgba(255,252,246,0.86);flex-shrink:0}
.lin-tile-mark-red{background:rgba(204,17,34,0.10);border-color:rgba(204,17,34,0.25);color:#f8505f}
.lin-tile-body{flex:1;min-width:0}
.lin-tile-title{font-size:13px;font-weight:600;display:flex;align-items:center;gap:7px}
.lin-tile-sub{font-size:11px;color:rgba(255,252,246,0.40);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lin-tile-arrow{color:rgba(255,252,246,0.30);flex-shrink:0}
.lin-feature{position:relative;background:linear-gradient(180deg,rgba(204,17,34,0.06),rgba(255,255,255,0.01));border:1px solid rgba(255,255,255,0.07);border-radius:14px;padding:24px 28px;margin-bottom:32px;overflow:hidden}
.lin-feature::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(204,17,34,0.4),transparent)}
.lin-feature-pinhead{display:flex;align-items:center;gap:8px;font-size:10px;font-weight:500;letter-spacing:0.12em;color:rgba(204,17,34,0.85);margin-bottom:14px;font-family:var(--font-display)}
.lin-feature-date{margin-left:auto;color:rgba(255,252,246,0.40);font-family:var(--font-mono);letter-spacing:0.05em}
.lin-feature-grid{display:grid;grid-template-columns:1fr 280px;gap:32px;align-items:center}
.lin-feature-eyebrow{font-family:var(--font-display);font-size:11px;letter-spacing:0.18em;color:rgba(255,252,246,0.62);margin-bottom:8px}
.lin-feature-title{font-size:22px;font-weight:600;letter-spacing:-0.5px;line-height:1.25;margin-bottom:10px}
.lin-feature-body{font-size:13px;color:rgba(255,252,246,0.62);line-height:1.65;margin-bottom:16px}
.lin-feature-actions{display:flex;gap:8px;flex-wrap:wrap}
.lin-feature-art{position:relative;height:180px;border-radius:10px;background:radial-gradient(circle at 30% 30%,rgba(204,17,34,0.20),#0a0a0c 70%);border:1px solid rgba(255,255,255,0.06);overflow:hidden;display:flex;align-items:center;justify-content:center}
.lin-feature-art-glow{position:absolute;width:200px;height:200px;background:radial-gradient(circle,rgba(204,17,34,0.3),transparent 70%);left:-30px;top:-30px;filter:blur(20px)}
.lin-feature-art-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.04) 1px,transparent 1px);background-size:24px 24px;mask-image:radial-gradient(circle at center,#000,transparent 75%);-webkit-mask-image:radial-gradient(circle at center,#000,transparent 75%)}
.lin-feature-art-mark{position:absolute;right:-30px;bottom:-20px;width:200px;height:200px;opacity:0.10;pointer-events:none}
.lin-feature-art-ver{font-family:var(--font-display);font-size:64px;letter-spacing:0.02em;line-height:1;background:linear-gradient(180deg,#fff,rgba(255,255,255,0.4));-webkit-background-clip:text;background-clip:text;color:transparent}
.lin-feature-art-vlabel{font-family:var(--font-mono);font-size:11px;color:rgba(255,252,246,0.40);letter-spacing:0.1em;margin-top:4px;text-align:center}
.lin-home-brand{display:flex;align-items:center;gap:14px;margin-bottom:18px;padding-bottom:18px;border-bottom:1px solid rgba(255,255,255,0.05)}
.lin-home-wordmark{height:22px;width:auto;display:block}
.lin-home-brand-rule{flex:1;height:1px;background:linear-gradient(90deg,rgba(255,255,255,0.10),transparent)}
.lin-home-brand-tag{font-family:var(--font-display);font-size:11px;letter-spacing:0.20em;color:rgba(255,252,246,0.50)}
.lin-bottom{display:grid;grid-template-columns:1fr 320px;gap:18px;align-items:flex-start}
.lin-section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.lin-section-title{font-size:14px;font-weight:600;color:rgba(255,252,246,0.86)}
.lin-link{display:inline-flex;align-items:center;gap:4px;background:transparent;border:none;color:rgba(255,252,246,0.62);font-size:12px;cursor:pointer;font-family:inherit}
.lin-link:hover{color:#fff}
.lin-list{display:flex;flex-direction:column}
.lin-list-bordered{background:rgba(255,255,255,0.015);border:1px solid rgba(255,255,255,0.06);border-radius:10px;overflow:hidden}
.lin-list-row{display:flex;align-items:center;gap:12px;padding:11px 14px;border-bottom:1px solid rgba(255,255,255,0.04);font-size:13px;background:transparent;transition:background .12s ease;text-align:left}
.lin-list-row:last-child{border-bottom:none}
.lin-list-row-btn{cursor:pointer;border:none;border-bottom:1px solid rgba(255,255,255,0.04);color:inherit;font-family:inherit;width:100%}
.lin-list-row-btn:last-child{border-bottom:none}
.lin-list-row-btn:hover{background:rgba(255,255,255,0.025)}
.lin-list-id{font-size:11px;color:rgba(255,252,246,0.40);min-width:78px;flex-shrink:0}
.lin-list-text{flex:1;color:rgba(255,252,246,0.86);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lin-list-meta{font-size:11px;color:rgba(255,252,246,0.40);font-family:var(--font-mono);flex-shrink:0}
.lin-list-arrow{color:rgba(255,252,246,0.30);flex-shrink:0}
.lin-empty{padding:32px;text-align:center;color:rgba(255,252,246,0.40);font-size:13px}
.lin-contact-card{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:18px}
.lin-contact-eyebrow{font-family:var(--font-display);font-size:10px;letter-spacing:0.14em;color:rgba(255,252,246,0.40);margin-bottom:12px}
.lin-contact-row{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.lin-contact-name{font-size:13px;font-weight:600}
.lin-contact-meta{font-size:11px;color:rgba(255,252,246,0.40)}
.lin-contact-detail{display:flex;flex-direction:column;gap:5px;font-size:12px;color:rgba(255,252,246,0.62);margin-bottom:14px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.05)}
.lin-contact-detail a{color:rgba(255,252,246,0.86);text-decoration:none}
.lin-contact-detail a:hover{color:#fff}
/* KB */
.lin-search-row{display:flex;align-items:center;gap:10px;padding:12px 14px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.07);border-radius:10px;margin-bottom:24px;transition:border-color .15s ease}
.lin-search-row:focus-within{border-color:rgba(204,17,34,0.4)}
.lin-search-row svg{color:rgba(255,252,246,0.50);flex-shrink:0}
.lin-search-input{flex:1;background:transparent;border:none;outline:none;font-size:14px;color:#fff}
.lin-search-input::placeholder{color:rgba(255,252,246,0.40)}
/* KB GRID VIEW */
.lin-kb-view-wrap{display:flex;gap:2px;padding:2px;background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.06);border-radius:7px}
.lin-kb-vbtn{width:28px;height:26px;display:flex;align-items:center;justify-content:center;background:transparent;border:none;border-radius:5px;color:rgba(255,252,246,0.50);cursor:pointer;transition:all .12s ease}
.lin-kb-vbtn.on{background:rgba(255,255,255,0.06);color:#fff}
.lin-kb-grid-view{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px}
@media(max-width:1024px){.lin-kb-grid-view{grid-template-columns:repeat(2,1fr)}}
.lin-kb-card{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:10px;overflow:hidden;cursor:pointer;transition:all .15s ease;display:flex;flex-direction:column;text-align:left;padding:0;width:100%}

function warrantyStatus(date){if(!date)return null;const purchased=new Date(date);const expires=new Date(purchased);expires.setFullYear(expires.getFullYear()+1);return Date.now()<expires.getTime()?'active':'inactive';}
function fmtMsg(t){return t.replace(/\*\*(.*?)\*\*/g,'<b>$1</b>').replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\n/g,'<br/>')}
function fmtDate(iso){try{const d=new Date(iso),now=new Date(),diff=(now-d)/1e3;if(diff<0)return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});if(diff<3600)return Math.floor(diff/60)+'m ago';if(diff<86400)return Math.floor(diff/3600)+'h ago';if(diff<2592000)return Math.floor(diff/86400)+'d ago';return d.toLocaleDateString('en-US',{month:'short',day:'numeric'})}catch{return ''}}
function statusTone(s=''){if(/resolv|closed|done/i.test(s))return 'green';if(/progress|working/i.test(s))return 'amber';if(/open|new/i.test(s))return 'blue';return 'ghost'}

// ── LOGIN ────────────────────────────────────────────────────────────────
function Login({onSignIn}){
  const[email,setEmail]=useState('');
  const[pw,setPw]=useState('');
  const[err,setErr]=useState('');
  const[loading,setLoading]=useState(false);
  const[remember,setRemember]=useState(false);
  const submit=async e=>{
    e.preventDefault();setErr('');setLoading(true);
    try{
      const r=await fetch('/api/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pw})});
      const d=await r.json();
      if(!r.ok){setErr(d.error||'Login failed');setLoading(false);return;}
      onSignIn(d.customer);
      if(remember){localStorage.setItem('p1_session',JSON.stringify({customer:d.customer,expires:Date.now()+30*24*60*60*1000}));}
    }catch{setErr('Connection error. Please try again.');setLoading(false);}
  };
  return(
    <div className="lin-login">
      <div className="lin-login-bg"/><div className="lin-login-bg2"/>
      <div className="lin-login-card">
        <div style={{marginBottom:24}}><img src={window.__resources.wordmarkKnockout} alt="Podium 1" style={{height:28,width:'auto',display:'block'}}/></div>
        <div className="lin-login-eyebrow">PODIUM 1 · SUPPORT PORTAL</div>
        <h1 className="lin-login-h1">Welcome back.</h1>
        <p className="lin-login-sub">Sign in with the credentials your owner specialist provided.</p>
        {err&&<div className="lin-login-err">{err}</div>}
        <form onSubmit={submit}>
          <label className="lin-label">Email</label>
          <input className="lin-input" type="email" value={email} onChange={e=>setEmail(e.target.value)} autoFocus placeholder="you@example.com"/>
          <label className="lin-label" style={{marginTop:14}}>Password</label>
          <input className="lin-input" type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="••••••••" onKeyDown={e=>{if(e.key==='Enter')submit(e)}}/>
          <div style={{display:'flex',alignItems:'center',gap:8,marginTop:12}}>
            <input type="checkbox" id="rememberMe" checked={remember} onChange={e=>setRemember(e.target.checked)} style={{accentColor:'#CC1122',width:14,height:14,cursor:'pointer'}}/>
            <label htmlFor="rememberMe" style={{fontSize:12,color:'rgba(255,252,246,0.62)',cursor:'pointer',userSelect:'none'}}>Keep me signed in for 30 days</label>
          </div>
          <button className="lin-btn-primary" type="submit" style={{marginTop:20,width:'100%'}} disabled={loading}>
            {loading?<Spin/>:<>Continue<Ico.ChevR width="13" height="13"/></>}
          </button>
        </form>
        <div className="lin-login-foot">New owner? Contact <a href="mailto:nathaniel@podium1racing.com">nathaniel@podium1racing.com</a></div>
      </div>
      <div className="lin-login-meta"><span>Podium 1 Racing · Nashville, TN</span><span>v4.0.0</span></div>
    </div>
  );
}

function SearchModal({onClose,setTab}){
  const[q,setQ]=useState('');
  const[kb,setKb]=useState([]);
  const[news,setNews]=useState([]);
  const ref=useRef(null);
  useEffect(()=>{
    ref.current?.focus();
    fetch('/api/kb').then(r=>r.json()).then(d=>setKb(d.files||[])).catch(()=>{});
    fetch('/api/news').then(r=>r.json()).then(d=>setNews(d.articles||[])).catch(()=>{});
  },[]);
  useEffect(()=>{const h=e=>{if(e.key==='Escape')onClose()};window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);},[onClose]);
  const sq=q.toLowerCase().trim();
  const mK=sq?kb.filter(f=>f.name?.toLowerCase().includes(sq)||f.category?.toLowerCase().includes(sq)).slice(0,5):[];
  const mN=sq?news.filter(a=>a.title?.toLowerCase().includes(sq)||a.source?.toLowerCase().includes(sq)).slice(0,3):[];
  const noResults=sq&&mK.length===0&&mN.length===0;
  const overlay={position:'fixed',inset:0,background:'rgba(0,0,0,0.6)',zIndex:500,display:'flex',alignItems:'flex-start',justifyContent:'center',padding:'12vh 24px 24px',backdropFilter:'blur(8px)'};
  return(
    <div style={overlay} onClick={onClose}>
      <div className="lin-search-modal" onClick={e=>e.stopPropagation()}>
        <div className="lin-search-modal-bar">
          <Ico.Search width="15" height="15" style={{color:'rgba(255,252,246,0.45)',flexShrink:0}}/>
          <input ref={ref} value={q} onChange={e=>setQ(e.target.value)} placeholder="Search knowledge base, news…" autoComplete="off"/>
          <kbd style={{fontFamily:'var(--font-mono)',fontSize:10,padding:'2px 6px',borderRadius:4,background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.08)',color:'rgba(255,252,246,0.35)'}}>ESC</kbd>
        </div>
        {sq&&(
          <div className="lin-search-results">
            {noResults&&<div className="lin-search-empty">No results for "{q}"</div>}
            {mK.length>0&&<><div className="lin-search-sect">Knowledge Base</div>{mK.map(f=><button key={f.id} className="lin-search-result" onClick={()=>{setTab('kb');onClose()}}><Ico.Book width="13" height="13"/><span style={{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{f.name}</span><span className="lin-search-result-meta">{f.category||'Article'}</span></button>)}</>}
            {mN.length>0&&<><div className="lin-search-sect">News</div>{mN.map((a,i)=><button key={i} className="lin-search-result" onClick={()=>{setTab('news');onClose()}}><Ico.News width="13" height="13"/><span style={{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{a.title}</span><span className="lin-search-result-meta">{a.source}</span></button>)}</>}
          </div>
        )}
        {!sq&&<div className="lin-search-hints"><span>Search KB articles and news</span><span style={{marginLeft:'auto'}}>ESC to close</span></div>}
      </div>
    </div>
  );
}

        <div className="lin-search-row"><Ico.Search width="14" height="14"/><input className="lin-search-input" placeholder="Search articles…" value={q} onChange={e=>setQ(e.target.value)}/></div>

      </div>
      {open&&(

      {activeVideo&&(()=>{
        const embed=getEmbed(activeVideo.url);
        const src=embed&&embed.includes('youtube.com')?embed+'&autoplay=1':embed;
        return(
          <div className="lin-vlb-overlay" onClick={()=>setActiveVideo(null)}>
            <div className="lin-vlb-inner" onClick={e=>e.stopPropagation()}>

    e.preventDefault();if(!desc.trim())return;setStatus('loading');

          <iframe
            src={"https://calendly.com/d/ctxc-r5r-xb2?hide_gdpr_banner=1&primary_color=cc1122&name="+encodeURIComponent(user.name)+"&email="+encodeURIComponent(user.email)}
            width="100%"

// ── RUFUS ─────────────────────────────────────────────────────────────────
const SUGG=['Screens not spanning','Motion stuck in idle','Wind kit silent','Surround channel routing'];
function RufusPage({user}){
  const first=user.name.split(' ')[0];
  const initials_=user.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  const[msgs,setMsgs]=useState([]);
  const[hist,setHist]=useState([]);
  const[val,setVal]=useState('');
  const[typing,setTyping]=useState(false);
  const[voiceMode,setVoiceMode]=useState(false);
  const[listening,setListening]=useState(false);
  const[ttsSupported]=useState(()=>'speechSynthesis' in window);
  const[sttSupported]=useState(()=>'webkitSpeechRecognition' in window||'SpeechRecognition' in window);
  const scrollRef=useRef();
  useEffect(()=>{scrollRef.current?.scrollTo({top:9e9,behavior:'smooth'})},[msgs,typing]);
  const speakText=useCallback(text=>{if(!ttsSupported)return;window.speechSynthesis.cancel();const utt=new SpeechSynthesisUtterance(text);utt.rate=0.95;utt.pitch=1;utt.volume=1;const voices=window.speechSynthesis.getVoices();const preferred=voices.find(v=>v.name.includes('Google US English')||v.name.includes('Samantha')||v.name.includes('Alex'));if(preferred)utt.voice=preferred;window.speechSynthesis.speak(utt);},[ttsSupported]);
  const send=useCallback(async text=>{
    if(!text.trim()||typing)return;
    setMsgs(m=>[...m,{r:'u',t:text}]);setVal('');setTyping(true);
    const newH=[...hist,{role:'user',content:text}];
    try{
      const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:newH,customerProfile:user})});
      const d=await r.json();setTyping(false);
      if(d.reply){setHist([...newH,{role:'assistant',content:d.reply}]);setMsgs(m=>[...m,{r:'a',h:fmtMsg(d.reply)}]);if(voiceMode)speakText(d.reply);}
      else setMsgs(m=>[...m,{r:'a',h:'Something went wrong. Please try again.'}]);
    }catch{setTyping(false);setMsgs(m=>[...m,{r:'a',h:'Connection error. Please try again.'}]);}
  },[typing,hist,user,voiceMode,speakText]);
  const startListening=()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR)return;
    setVoiceMode(true);setListening(true);
    const rec=new SR();
    rec.lang='en-US';rec.interimResults=false;rec.maxAlternatives=1;
    rec.onresult=e=>{const transcript=e.results[0][0].transcript;setListening(false);setVal(transcript);setTimeout(()=>send(transcript),100);};
    rec.onerror=()=>setListening(false);
    rec.onend=()=>setListening(false);
    rec.start();
  };
  return(
    <div className="lin-rufus">
      <header className="lin-rufus-head">
        <div className="lin-rufus-mark"><img src={window.__resources.logomark} alt="P1" width="20" height="20" style={{display:'block',objectFit:'contain'}}/></div>
        <div><div className="lin-rufus-name">RUFUS<span className="lin-dot lin-dot-green" style={{marginLeft:8}}/></div><div className="lin-rufus-sub">Online · knows your full rig setup</div></div>
        <div className="lin-rufus-meta">{user.rig&&<><span>{user.rig}</span><span>·</span></>}<span>{user.email}</span></div>
      </header>
      <div className="lin-rufus-scroll" ref={scrollRef}>
        <div className="lin-rufus-greet">
          <div className="lin-rufus-glow"/>
          <div className="lin-rufus-glyph"><img src={window.__resources.logomark} alt="P1" width="32" height="32" style={{display:'block',objectFit:'contain'}}/></div>
          <div className="lin-rufus-h">How can I help, {first}?</div>
          <div className="lin-rufus-p">I have your rig configuration and the full P1 knowledge base. Ask anything.</div>
        </div>
        <div className="lin-rufus-msgs">
          {msgs.map((m,i)=>(
            <div key={i} className={'lin-msg'+(m.r==='u'?' u':'')}>
              {m.r!=='u'&&<div className="lin-msg-av lin-msg-av-r"><Ico.Spark width="11" height="11"/></div>}
              <div className={'lin-bubble lin-bubble-'+(m.r==='u'?'u':'r')}>
                {m.r==='u'?m.t:<span dangerouslySetInnerHTML={{__html:m.h}}/>}
              </div>
              {m.r==='u'&&<Av initials={initials_} size={26}/>}
            </div>
          ))}
          {typing&&<div className="lin-msg"><div className="lin-msg-av lin-msg-av-r"><Ico.Spark width="11" height="11"/></div><div className="lin-typing"><span/><span/><span/></div></div>}
        </div>
      </div>
      <footer className="lin-rufus-foot">
        {msgs.length===0&&<div className="lin-rufus-suggest">{SUGG.map(s=><button key={s} className="lin-chip" onClick={()=>send(s)}>{s}</button>)}</div>}
        {voiceMode&&(
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'6px 12px',background:'rgba(204,17,34,0.06)',border:'1px solid rgba(204,17,34,0.15)',borderRadius:8,marginBottom:6,fontSize:11,color:'rgba(255,252,246,0.62)'}}>
            <span style={{display:'flex',alignItems:'center',gap:6}}><span style={{width:6,height:6,borderRadius:'50%',background:'#CC1122',display:'inline-block'}}/>Voice mode — Rufus will speak his replies</span>
            <button onClick={()=>{setVoiceMode(false);window.speechSynthesis.cancel();}} style={{background:'none',border:'none',color:'rgba(255,252,246,0.40)',cursor:'pointer',fontSize:11,padding:0}}>Turn off</button>
          </div>
        )}
        <div className="lin-rufus-input">
          {sttSupported&&(
            <button onClick={startListening} title={voiceMode?'Voice mode on — click to disable':'Click to use voice'} style={{background:voiceMode?'rgba(204,17,34,0.15)':'transparent',border:voiceMode?'1px solid rgba(204,17,34,0.4)':'1px solid rgba(255,255,255,0.08)',borderRadius:8,padding:'0 10px',height:36,cursor:'pointer',color:voiceMode?'#CC1122':'rgba(255,252,246,0.4)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,transition:'all .15s ease'}}>
              {listening
                ?<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5"><circle cx="8" cy="8" r="6" strokeDasharray="2 2"/><circle cx="8" cy="8" r="2" fill="currentColor"/></svg>
                :<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5"><rect x="5.5" y="1.5" width="5" height="8" rx="2.5"/><path d="M3 8a5 5 0 0010 0"/><line x1="8" y1="13" x2="8" y2="15.5"/></svg>
              }
            </button>
          )}
          <textarea rows={1} placeholder="Ask RUFUS anything about your simulator…" value={val} onChange={e=>setVal(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send(val)}}}/>
          <button className="lin-send" onClick={()=>send(val)} disabled={!val.trim()||typing}><Ico.Send width="13" height="13"/></button>
        </div>
        <div className="lin-rufus-disclaimer">RUFUS may make mistakes. For warranty actions, a human will always confirm.</div>
      </footer>
    </div>
  );
}

      {!loading&&feat&&tab==='all'&&(
        <>
          <div className="lin-news-pin-badge"><Ico.Pin width="11" height="11"/>FEATURED · PINNED BY PODIUM 1</div>
          <a href={feat.url||'#'} target="_blank" rel="noopener noreferrer" className="lin-news lin-news-big">
            <div className="lin-news-art" style={{background:'linear-gradient(135deg,#1a0408,#2a0a12 55%,#cc1122)'}}><div className="lin-news-art-glow"/><div className="lin-news-art-tag">{feat.source||'NEWS'}</div></div>
            <div className="lin-news-body">
              <div className="lin-news-meta"><span className="lin-news-src">{feat.source||'Podium 1'}</span>{feat.created_at&&<><span>·</span><span>{fmtDate(feat.created_at)}</span></>}</div>
              <h3 className="lin-news-title">{feat.title}</h3>
              {feat.summary&&<p className="lin-news-excerpt">{feat.summary}</p>}
            </div>
          </a>
        </>
      )}
      {!loading&&filtered.length>0&&(
        <>
          <div className="lin-section-head" style={{marginTop:feat&&tab==='all'?32:0}}>
            <h3 className="lin-section-title">Latest headlines <span style={{fontWeight:400,color:'rgba(255,252,246,0.40)',fontSize:11,marginLeft:6}}>{filtered.length} articles</span></h3>
          </div>
          <div className="lin-news-grid">
            {filtered.slice(0,24).map((n,i)=>(
              <a key={i} href={n.url||'#'} target="_blank" rel="noopener noreferrer" className="lin-news">
                <div className="lin-news-art"><div className="lin-news-art-grid"/>{n.image&&<img src={n.image} alt="" onError={e=>{e.target.style.display='none'}}/>}<div className="lin-news-art-tag">{n.source}</div></div>
                <div className="lin-news-body">
                  <div className="lin-news-meta"><span className="lin-news-src">{n.source}</span>{n.date&&<><span>·</span><span>{fmtDate(n.date)}</span></>}</div>
                  <h3 className="lin-news-title">{n.title}</h3>
                </div>
              </a>
            ))}
          </div>
        </>
      )}
      {!loading&&!feat&&filtered.length===0&&<div className="lin-empty">No news available{tab!=='all'?' in this category':''}. Check back soon.</div>}
    </div>
  );
}


// ── APP ────────────────────────────────────────────────────────────────────
function App(){
  const[user,setUser]=useState(()=>{try{const s=JSON.parse(localStorage.getItem('p1_session'));if(s&&s.expires>Date.now())return s.customer;}catch{}return null;});
  const[tab,setTab]=useState('home');
  const[collapsed,setCollapsed]=useState(()=>{
    const s=localStorage.getItem('p1_sidebar_collapsed');
    if(s!==null)return s==='true';
    return window.innerWidth<=768;
  });
  const[showSearch,setShowSearch]=useState(false);
  useEffect(()=>{localStorage.setItem('p1_sidebar_collapsed',String(collapsed))},[collapsed]);
  useEffect(()=>{
    if(!user)return;
    const h=e=>{
      if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT')return;
      if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();setShowSearch(true);return;}
      const map={h:'home',b:'kb',t:'ticket',r:'rufus',n:'news'};
      if(map[e.key.toLowerCase()])setTab(map[e.key.toLowerCase()]);
    };
    window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);
  },[user]);

  if(!user)return <Login onSignIn={setUser}/>;
  return(
    <div className="lin-app">
      {showSearch&&<SearchModal onClose={()=>setShowSearch(false)} setTab={t=>{setTab(t);setShowSearch(false)}}/>}
      <Sidebar tab={tab} setTab={setTab} user={user} collapsed={collapsed} setCollapsed={setCollapsed} onOpenSearch={()=>setShowSearch(true)} onLogout={()=>{localStorage.removeItem('p1_session');setUser(null);}}/>
      <div className="lin-main-wrap">
        {tab==='home'   &&<Home user={user} setTab={setTab}/>}
        {tab==='kb'     &&<div style={{flex:1,overflowY:'auto',background:'#0a0a0c',height:'100%'}}><KBPage/></div>}
        {tab==='ticket' &&<div style={{flex:1,overflowY:'auto',background:'#0a0a0c',height:'100%'}}><TicketPage user={user}/></div>}
        {tab==='rufus'  &&<RufusPage user={user}/>}
        {tab==='news'   &&<div style={{flex:1,overflowY:'auto',background:'#0a0a0c',height:'100%'}}><NewsPage/></div>}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
